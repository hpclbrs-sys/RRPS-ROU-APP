          if(vpBadgeRef.current[mid]){try{vpBadgeRef.current[mid].remove();}catch(_e){}delete vpBadgeRef.current[mid];}
          if(escBadgeRef.current[mid]){try{escBadgeRef.current[mid].remove();}catch(_e){}delete escBadgeRef.current[mid];}
        }
      });
    }
    // Tick every second — update the live timer text on each active alarm marker
    timerIntervalRef.current=setInterval(function(){
      Object.keys(timerBadgeRef.current).forEach(function(mid){
        var mrk=alarmMrksRef.current[mid];
        if(!mrk||!mrk.ilData)return;
        var elapsed=Date.now()-(mrk.ilData.setAt||Date.now());
        var m=Math.floor(elapsed/60000),s=Math.floor((elapsed%60000)/1000);
        var txt="⏱ "+m+":"+(s<10?"0":"")+s;
        var el=timerBadgeRef.current[mid].getElement();
        if(el){var inner=el.querySelector("div");if(inner)inner.textContent=txt;}
      });
    },1000);
    // Start listening — works immediately, no GPS needed
    if(db){
      // IMPORTANT: keep a reference to THIS map's handler and detach only it.
      // A bare off("value") removes EVERY value listener on the path — it was
      // silently killing the app-level chat listener, freezing the
      // "★ Alarm Interlock Active" state in chat after the map was closed.
      var _ilMapHandler=function(snap){updateAlarmMarkers(snap.val()||{});};
      ilListenerRef.current=db.ref(FB_ROOT+"/interlocks");
      ilListenerRef.current._hpclHandler=_ilMapHandler;
      ilListenerRef.current.on("value",_ilMapHandler);

      // ── LDS leak alarms: BIG pulsing magenta diamond + dashed circle,
      //    violet glowing rings on every ±3 km vulnerable point.
      //    Visible to Control Room and the assigned person only.
      //    (Scoped handler — same pattern as the interlocks above.)
      function updateLdsMarkers(data){
        if(!mapObj.current)return;
        ldsMrksRef.current.forEach(function(o){try{o.remove();}catch(_e){}});
        ldsMrksRef.current=[];
        Object.keys(data||{}).forEach(function(k){
          var e=data[k];
          if(!e||!isFinite(parseFloat(e.lat)))return;
          if(viewerId!=="u16"&&e.assignedTo!==viewerId)return;
          try{
            var ll=[parseFloat(e.lat),parseFloat(e.lng)];
            var mk=L.marker(ll,{icon:L.divIcon({html:
              "<div style='position:relative;width:46px;height:46px;display:flex;align-items:center;justify-content:center'>"+
              "<div style='width:32px;height:32px;background:#d946ef;border:3px solid #fff;transform:rotate(45deg);box-shadow:0 0 18px 6px rgba(217,70,239,.65);animation:ldsPulse 1.4s ease-in-out infinite'></div>"+
              "<div style='position:absolute;font-size:15px;line-height:1'>🛑</div></div>",
              iconSize:[46,46],iconAnchor:[23,23],className:""}),zIndexOffset:1400}).addTo(mapObj.current);
            var pop="<b style='color:#a21caf;font-size:13px'>🛑 LDS LEAK ALARM</b><br>"+
              "Leak CH "+e.lds+" ("+e.section+")<br>System CH"+e.ch+" · OD "+e.od+"<br>"+
              "Assigned: <b>"+(e.assignedToName||"")+"</b>"+
              (viewerId==="u16"
                ?"<br><button onclick=\"window.__hpclLdsRemove&&window.__hpclLdsRemove('"+k+"')\" style='margin-top:6px;background:#a21caf;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-weight:800;cursor:pointer;font-size:11px'>Remove highlight</button>"
                :"");
            mk.bindPopup(pop);
            ldsMrksRef.current.push(mk);
            ldsMrksRef.current.push(L.circle(ll,{radius:150,color:"#d946ef",weight:2.5,dashArray:"8,6",fillColor:"#d946ef",fillOpacity:.10}).addTo(mapObj.current));
            ldsMrksRef.current.push(L.marker(ll,{interactive:false,zIndexOffset:1390,icon:L.divIcon({html:
              "<div style='background:#a21caf;color:#fff;font-size:9px;font-weight:800;padding:2px 8px;border-radius:8px;white-space:nowrap;border:1.5px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4)'>🛑 LDS LEAK · CH"+e.ch+"</div>",
              iconSize:[118,16],iconAnchor:[59,-27],className:""})}).addTo(mapObj.current));
            (e.vps||[]).forEach(function(v){
              if(!isFinite(parseFloat(v.lat)))return;
              ldsMrksRef.current.push(
                L.marker([parseFloat(v.lat),parseFloat(v.lng)],{zIndexOffset:1300,icon:L.divIcon({html:
                  "<div style='width:36px;height:36px;border-radius:50%;border:4px double #8b5cf6;background:rgba(139,92,246,.35);box-shadow:0 0 16px 5px rgba(139,92,246,.75);animation:ldsVpGlow 1.8s ease-in-out infinite;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:900;color:#4c1d95;text-shadow:0 0 3px #fff'>VP</div>",
                  iconSize:[36,36],iconAnchor:[18,18],className:""})}).addTo(mapObj.current)
                  .bindPopup("<b style='color:#6d28d9'>⚠ Vulnerable Point</b><br>CH "+v.ch+"<br>within ±3 km of LDS leak CH"+e.ch)
              );
            });
            // 24-hour alarms near the leak — TEAL dashed diamonds
            // (filled ! = still active · hollow ✓ = resolved) — a style
            // used nowhere else in the system.
            (e.recent||[]).forEach(function(r){
              if(!isFinite(parseFloat(r.lat)))return;
              var act=!!r.active;
              ldsMrksRef.current.push(
                L.marker([parseFloat(r.lat),parseFloat(r.lng)],{zIndexOffset:1250,icon:L.divIcon({html:
                  "<div style='width:20px;height:20px;transform:rotate(45deg);border:2.5px dashed #0d9488;background:"+(act?"#14b8a6":"rgba(255,255,255,.92)")+";box-shadow:0 0 8px 2px rgba(20,184,166,.55);display:flex;align-items:center;justify-content:center'>"+
                  "<div style='transform:rotate(-45deg);font-size:10px;font-weight:900;color:"+(act?"#fff":"#0f766e")+";line-height:1'>"+(act?"!":"✓")+"</div></div>",
                  iconSize:[20,20],iconAnchor:[10,10],className:""})}).addTo(mapObj.current)
                  .bindPopup("<b style='color:#0f766e'>🔔 24-h alarm near LDS leak</b><br>CH "+r.ch+" — "+(act?"⚠ ACTIVE":"✅ RESOLVED")+(r.to?"<br>Assigned: "+r.to:"")+"<br>"+new Date(r.at).toLocaleString())
              );
            });
          }catch(_e){}
        });
      }
      window.__hpclLdsRemove=function(k){
        if(db&&viewerId==="u16"){db.ref(FB_ROOT+"/ldsAlarms/"+k).remove();}
      };
      var _ldsHandler=function(snap){updateLdsMarkers(snap.val()||{});};
      ldsListenerRef.current=db.ref(FB_ROOT+"/ldsAlarms");
      ldsListenerRef.current._hpclHandler=_ldsHandler;
      ldsListenerRef.current.on("value",_ldsHandler);
      window.__hpclMapOpen=true; // global 20 m clear defers to the map while open
    }

    // ── Daily trace + coverage: the tracked person in Track mode,
    //    otherwise the viewer themself (not for Control Room's own id) ──
    var _focusMbr=targetMember||((window.__hpcl_team||[]).find(function(t){return t.id===viewerId;})||null);
    if(_focusMbr&&_focusMbr.id!=="u16")startTraceCoverage(_focusMbr);

    // ── In Track mode (targetMember set), Control Room does NOT share
    //    or use their own location at all — only the target person is tracked.
    if(targetMember){
      // Skip own GPS entirely. Distance is computed from the TARGET marker instead
      // (handled in the targetListenerRef.on("value") callback above).
      return;
    }

    if(!navigator.geolocation){setLocErr("Geolocation not supported");return;}
    wid.current=navigator.geolocation.watchPosition(
      function(p){
        var lat=p.coords.latitude,lng=p.coords.longitude,acc=Math.round(p.coords.accuracy);
        var d=_nearestMeters(lat,lng);
        setYou({lat:lat,lng:lng,acc:acc});setDist(d);
        // Draw perpendicular arrow from YOU to nearest point on pipeline
        var np=_nearestPoint(lat,lng);
        if(perpLineRef.current){perpLineRef.current.remove();}
        perpLineRef.current=L.polyline([[lat,lng],[np.lat,np.lng]],{
          color:'#ef4444',weight:2,opacity:0.8,dashArray:'6,4'
        }).addTo(mapObj.current);
        if(youMrk.current){youMrk.current.setLatLng([lat,lng]);}else{
          youMrk.current=L.marker([lat,lng],{icon:mkIco("YOU","#3b82f6",34),zIndexOffset:1000}).addTo(mapObj.current).bindPopup("You");
          mapObj.current.setView([lat,lng],15);
        }
        // Accumulate signed distance toward each active interlock.
        // Positive = moving toward the alarm location.
        // Negative = moving away from the alarm location.
        var prevYou=youLatLngRef.current;
        if(prevYou&&Object.keys(alarmMrksRef.current).length>0){
          var R0=6371000;
          var dA0=(lat-prevYou.lat)*Math.PI/180,dB0=(lng-prevYou.lng)*Math.PI/180;
          var x0=Math.sin(dA0/2)*Math.sin(dA0/2)+Math.cos(prevYou.lat*Math.PI/180)*Math.cos(lat*Math.PI/180)*Math.sin(dB0/2)*Math.sin(dB0/2);
          var stepDist=R0*2*Math.atan2(Math.sqrt(x0),Math.sqrt(1-x0));
          if(stepDist<200){ // ignore GPS jumps/glitches
            Object.keys(alarmMrksRef.current).forEach(function(mid){
              var mrk=alarmMrksRef.current[mid];
              var il=mrk.getLatLng();
              // Distance from PREVIOUS position to alarm
              var dAp=(il.lat-prevYou.lat)*Math.PI/180,dBp=(il.lng-prevYou.lng)*Math.PI/180;
              var xp=Math.sin(dAp/2)*Math.sin(dAp/2)+Math.cos(prevYou.lat*Math.PI/180)*Math.cos(il.lat*Math.PI/180)*Math.sin(dBp/2)*Math.sin(dBp/2);
              var prevDistToAlarm=R0*2*Math.atan2(Math.sqrt(xp),Math.sqrt(1-xp));
              // Distance from CURRENT position to alarm
              var dAc=(il.lat-lat)*Math.PI/180,dBc=(il.lng-lng)*Math.PI/180;
              var xc=Math.sin(dAc/2)*Math.sin(dAc/2)+Math.cos(lat*Math.PI/180)*Math.cos(il.lat*Math.PI/180)*Math.sin(dBc/2)*Math.sin(dBc/2);
              var currDistToAlarm=R0*2*Math.atan2(Math.sqrt(xc),Math.sqrt(1-xc));
              // +ve = got closer (towards alarm), -ve = got further (away from alarm)
              var signedDelta=prevDistToAlarm-currDistToAlarm;
              distTraveledRef.current[mid]=(distTraveledRef.current[mid]||0)+signedDelta;
            });
          }
        }
        // Update current position ref — Firebase listener uses this for 20m auto-clear
        youLatLngRef.current={lat:lat,lng:lng};
        // Trigger interlock check with current position
        if(db&&Object.keys(alarmMrksRef.current).length>0){
          var R=6371000;
          Object.keys(alarmMrksRef.current).forEach(function(mid){
            var mrk=alarmMrksRef.current[mid];
            var il=mrk.getLatLng();
            var dA=(il.lat-lat)*Math.PI/180,dB=(il.lng-lng)*Math.PI/180;
            var x2=Math.sin(dA/2)*Math.sin(dA/2)+Math.cos(lat*Math.PI/180)*Math.cos(il.lat*Math.PI/180)*Math.sin(dB/2)*Math.sin(dB/2);
            var mdist=R*2*Math.atan2(Math.sqrt(x2),Math.sqrt(1-x2));
            // ESCALATED alarms: 20 m auto-clear allowed ONLY for the designated SUP
            var _ild=mrk.ilData||{};
            var _canAuto2=_ild.escalated?escViewerIsSup(_ild,viewerId)
              :(_ild.ldsLock?(_ild.assignedTo===viewerId):true);
            if(mdist<=20&&_canAuto2){
              try{postClearStats(mid,mrk.ilData||il);}catch(_e){console.log("clear-stats error:",_e);}
              db.ref(FB_ROOT+"/interlocks/"+mid).remove();
            }
          });
        }
      },
      function(e){setLocErr(e.code===1?"Location denied. Allow in settings.":"Location unavailable.");},
      {enableHighAccuracy:true,maximumAge:0,timeout:30000}
    );
  }
  useEffect(function(){
    return function(){
      if(wid.current)navigator.geolocation.clearWatch(wid.current);
      if(ilListenerRef.current){ilListenerRef.current.off("value",ilListenerRef.current._hpclHandler);ilListenerRef.current=null;}
      window.__hpclMapOpen=false;
      if(ldsListenerRef.current){ldsListenerRef.current.off("value",ldsListenerRef.current._hpclHandler);ldsListenerRef.current=null;}
      ldsMrksRef.current.forEach(function(o){try{o.remove();}catch(_e){}});
      ldsMrksRef.current=[];
      if(targetListenerRef.current){targetListenerRef.current.off("value",targetListenerRef.current._hpclHandler);targetListenerRef.current=null;}
      if(perpLineRef.current){perpLineRef.current.remove();perpLineRef.current=null;}
      if(timerIntervalRef.current){clearInterval(timerIntervalRef.current);timerIntervalRef.current=null;}
      Object.values(timerBadgeRef.current).forEach(function(b){b.remove();});
      timerBadgeRef.current={};
      Object.values(vpBadgeRef.current).forEach(function(b){b.remove();});
      vpBadgeRef.current={};
      Object.values(escBadgeRef.current).forEach(function(b){b.remove();});
      escBadgeRef.current={};
      stopTraceCoverage();
      if(mapObj.current){mapObj.current.remove();mapObj.current=null;}
    };
  },[]);

  // Android back button — push history so back closes map not app
  useEffect(function(){
    history.pushState({pipeMap:true},"","");
    var fn=function(){onClose();};
    window.addEventListener("popstate",fn);
    return function(){window.removeEventListener("popstate",fn);};
  },[]);

  var dc=dist===null?"#9ca3af":dist<100?"#22c55e":dist<500?"#f59e0b":"#ef4444";
  var _myMbr=(window.__hpcl_team||[]).find(function(t){return t.id===viewerId;})||null;
  var _distLabel=(_myMbr&&/\d{1,4}(?:\.\d+)?\s*-\s*\d{1,4}(?:\.\d+)?/.test(_myMbr.name))?"from patch pipeline":"from pipeline";
  return(
    <div style={{position:"fixed",inset:0,zIndex:9995,background:"#f4f6fa",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"10px 16px",background:"#eef1f6",borderBottom:"2px solid #d6a200",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <button onClick={onClose} style={{background:"none",border:"none",color:"#d6a200",fontSize:22,cursor:"pointer",fontWeight:700,padding:0,lineHeight:1}}>X</button>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:700,color:"#111827"}}>
            {targetMember?("Tracking: "+targetMember.name):"Pipeline Map"}
          </div>
          <div style={{fontSize:10,color:targetMember?"#a78bfa":"#d6a200"}}>
            {targetMember
              ?(targetLoc?"Live location · purple marker":"Waiting for their location...")
              :"Pipeline Map - Live Location"}
          </div>
        </div>
        {dist!==null&&(
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:20,fontWeight:800,color:dc}}>{dist<1000?(dist+"m"):((dist/1000).toFixed(2)+"km")}</div>
            <div style={{fontSize:9,color:"#6b7280"}}>{_distLabel}</div>
          </div>
        )}
      </div>
      <div style={{padding:"5px 16px",background:"#ffffff",flexShrink:0}}>
        {targetMember?(
          // Track mode — show ONLY the target person's info, never our own location
          !targetLoc?(
            <div style={{fontSize:11,color:"#6b7280"}}>Waiting for {targetMember.name} to share location...</div>
          ):(
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:10,color:"#6b7280"}}>
                {targetMember.name}: {targetLoc.lat.toFixed(5)}, {targetLoc.lng.toFixed(5)}
                {targetLoc.accuracy?(" (acc:"+targetLoc.accuracy+"m)"):""}
              </div>
              {dist!==null&&<div style={{fontSize:11,fontWeight:700,color:dc}}>{dist<50?"ON PIPELINE":(dist+"m "+_distLabel)}</div>}
            </div>
          )
        ):(
          // Normal mode (no target) — show own GPS
          <>
            {locErr&&<div style={{fontSize:11,color:"#f87171"}}>{locErr}</div>}
            {!locErr&&!you&&<div style={{fontSize:11,color:"#6b7280"}}>Getting your GPS location...</div>}
            {!locErr&&you&&(
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:10,color:"#6b7280"}}>{you.lat.toFixed(5)}, {you.lng.toFixed(5)} (acc:{you.acc}m)</div>
                {dist!==null&&<div style={{fontSize:11,fontWeight:700,color:dc}}>{dist<50?"ON PIPELINE":(dist+"m "+_distLabel)}</div>}
              </div>
            )}
          </>
        )}
      </div>
      <div style={{flex:1,width:"100%",minHeight:0,position:"relative"}}>
        <div ref={mapDiv} style={{position:"absolute",inset:0}}/>
        {targetMember&&(
          <button onClick={()=>setAutoFollow(f=>!f)}
            title={autoFollow?"Auto-follow is ON — map recenters on movement. Tap to freeze the view.":"Auto-follow is OFF — map stays put. Tap to follow movement."}
            style={{position:"absolute",top:8,right:8,zIndex:1001,
              display:"flex",alignItems:"center",gap:6,padding:"7px 11px",borderRadius:20,cursor:"pointer",
              background:autoFollow?"linear-gradient(135deg,#7c3aed,#9333ea)":"rgba(255,255,255,.95)",
              border:"1.5px solid "+(autoFollow?"#6d28d9":"rgba(17,24,39,.2)"),
              color:autoFollow?"#fff":"#374151",fontSize:11,fontWeight:800,
              boxShadow:"0 2px 8px rgba(0,0,0,.3)"}}>
            {autoFollow?"🎯 Following":"❄ Frozen"}
          </button>
        )}
        {covInfo&&(
          <div style={{position:"absolute",top:8,left:"50%",transform:"translateX(-50%)",zIndex:1000,
            background:"rgba(17,24,39,.93)",border:"1.5px solid "+(covInfo.pct>=100?"#22c55e":"#facc15"),
            color:"#fff",borderRadius:10,padding:"5px 12px",fontSize:11.5,fontWeight:800,
            boxShadow:"0 2px 10px rgba(0,0,0,.5)",textAlign:"center",pointerEvents:"none",maxWidth:"92%"}}>
            🧭 {covInfo.name} — patch coverage: <span style={{color:covInfo.pct>=100?"#22c55e":"#facc15"}}>{covInfo.pct}%</span> ({covInfo.done}/{covInfo.total} × 100 m blocks)
            <div style={{fontSize:9.5,fontWeight:600,color:"#facc15"}}>yellow = not covered yet · green = covered (25 m zone) · resets at {/^NPV/i.test(targetMember&&targetMember.name||"")?"09:00 (night shift)":"00:00"}</div>
          </div>
        )}
      </div>
      {/* Bottom legend bar removed on request — applies to all viewers */}
    </div>
  );
}

              :<div style={{width:"100%",height:"100%",background:"linear-gradient(135deg,"+gold+","+goldL+")",
                display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}}>👥</div>
            }
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:700,color:"#1c1c1c",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {group.name}
            </div>
            <div style={{fontSize:11,color:"#6b7280"}}>{members.length} members</div>
          </div>
          {me.id===group.createdBy&&(
            <button onClick={()=>setEditMode(e=>!e)}
              title="Edit group name and photo"
              style={{background:"rgba(214,162,0,.1)",border:"1px solid "+gold+"44",
                borderRadius:8,width:30,height:30,display:"flex",alignItems:"center",
                justifyContent:"center",cursor:"pointer",color:gold,fontSize:14,flexShrink:0}}>
              ✎
            </button>
          )}
          <button onClick={onClose}
            style={{background:"none",border:"none",fontSize:20,color:"#6b7280",cursor:"pointer",lineHeight:1}}>
            X
          </button>
        </div>
        {editMode&&(
          <div style={{background:"#fdf6e3",borderRadius:12,padding:"12px 14px",marginBottom:14,border:"1px solid "+gold+"66"}}>
            <div style={{fontSize:11,fontWeight:700,color:"#4b5563",textTransform:"uppercase",letterSpacing:.8,marginBottom:8}}>Edit Group</div>
            <input value={editName} onChange={e=>setEditName(e.target.value)}
              placeholder="Group name"
              style={{width:"100%",padding:"8px 12px",border:"1.5px solid "+gold,borderRadius:8,
                fontSize:13,color:"#1c1c1c",background:"#fff",marginBottom:10,boxSizing:"border-box"}}/>
            <div style={{fontSize:11,fontWeight:700,color:"#4b5563",marginBottom:6}}>Group Photo</div>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              <div style={{width:60,height:60,borderRadius:10,overflow:"hidden",border:"2px solid "+gold,
                flexShrink:0,cursor:"pointer"}} onClick={()=>imgRef.current.click()}>
                {imgPreview
                  ?<img src={imgPreview} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                  :<div style={{width:"100%",height:"100%",background:"linear-gradient(135deg,"+gold+","+goldL+")",
                    display:"flex",alignItems:"center",justifyContent:"center",fontSize:24}}>👥</div>
                }
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <button onClick={()=>imgRef.current.click()}

                  📷 Choose Photo

              <button onClick={saveEdit}
                style={{flex:1,padding:"8px",border:"none",borderRadius:8,

                Save
              </button>
            </div>
          </div>
        )}

        <div style={{fontSize:11,fontWeight:700,color:"#4b5563",textTransform:"uppercase",
          letterSpacing:.8,marginBottom:8,flexShrink:0}}>
          Members
        </div>

        <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:5,marginBottom:12}}>
          {members.map(mid=>{
            const m=team.find(t=>t.id===mid);
            if(!m)return null;
            return(
              <div key={mid} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 10px",
                borderRadius:10,background:"#f8fafc",border:"1px solid #e5e7eb"}}>
                <Avatar member={m} size={32}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,color:"#1c1c1c"}}>
                    {m.name}{m.id===me.id?" (you)":""}{m.id===group.createdBy?" ★":""}
                  </div>
                  <div style={{fontSize:10,color:"#6b7280"}}>{m.role}</div>
                </div>
                {canManage&&m.id!==group.createdBy&&(
                  <button onClick={()=>removeMember(m.id)} title={"Remove "+m.name+" from group"}
                    style={{background:"rgba(220,38,38,.1)",border:"1px solid rgba(220,38,38,.35)",
                      color:"#dc2626",width:26,height:26,borderRadius:8,fontSize:13,fontWeight:800,
                      cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                )}
              </div>
            );
          })}
        </div>

        {!addMode?(
          canManage&&nonMembers.length>0&&(
            <button onClick={()=>setAddMode(true)}
              style={{flexShrink:0,width:"100%",padding:"11px",
                background:"linear-gradient(135deg,"+gold+","+goldL+")",
                color:"#1c1c1c",border:"none",borderRadius:10,fontSize:13,fontWeight:700,
                cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
              + Add Member
            </button>
          )
        ):(
          <div style={{flexShrink:0}}>
            <div style={{fontSize:11,fontWeight:700,color:"#4b5563",textTransform:"uppercase",
              letterSpacing:.8,marginBottom:6}}>
              Select person to add
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5,maxHeight:200,overflowY:"auto",marginBottom:8}}>
              {nonMembers.map(m=>(
                <button key={m.id} onClick={()=>addMember(m.id)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                    borderRadius:10,background:"#f0fdf4",border:"1px solid #86efac",
                    cursor:"pointer",width:"100%",textAlign:"left"}}>
                  <Avatar member={m} size={30}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,fontWeight:600,color:"#1c1c1c"}}>{m.name}</div>
                    <div style={{fontSize:10,color:"#6b7280"}}>{m.role}</div>
                  </div>
                  <span style={{fontSize:20,color:"#15803d",fontWeight:700,flexShrink:0}}>+</span>
                </button>
              ))}
            </div>
            <button onClick={()=>setAddMode(false)}
              style={{width:"100%",padding:"8px",background:"none",border:"1px solid #e5e7eb",
                borderRadius:10,color:"#6b7280",fontSize:12,cursor:"pointer"}}>
              Cancel
            </button>
          </div>
        )}

      </div>
    </div>
  );
}


/* ══════════════════════════════════════════════════════
   ALARM SHEET MODAL — Control Room full alarm export
══════════════════════════════════════════════════════ */
function AlarmSheetModal({db,onClose}){
  const gold="#d6a200",goldL="#f0c040";
  const allTeam=window.__hpcl_team||DEFAULT_TEAM;

  const [fromDate,setFromDate]=useState('');
  const [fromTime,setFromTime]=useState('00:00');
  const [toDate,setToDate]=useState('');
  const [toTime,setToTime]=useState('23:59');
  const [statusFilter,setStatusFilter]=useState('all');   // all | active | cleared
  const [pipeFilter,setPipeFilter]=useState('all');       // all | p1 | p2 | p3 | p4 | p5
  const [personFilter,setPersonFilter]=useState('all');   // all | userId

  const [loading,setLoading]=useState(false);
  const [allRows,setAllRows]=useState([]);
  const [preview,setPreview]=useState(null);  // {total,active,cleared} or null
  const [loadErr,setLoadErr]=useState('');

  const fmtDT=ts=>{
    if(!ts)return'';
    const d=new Date(ts);
    const dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),yy=d.getFullYear();
    const hh=String(d.getHours()).padStart(2,'0'),mi=String(d.getMinutes()).padStart(2,'0'),ss=String(d.getSeconds()).padStart(2,'0');
    return dd+'/'+mm+'/'+yy+' '+hh+':'+mi+':'+ss;
  };

  const mbrName=uid=>{
    if(!uid)return'';
    const m=allTeam.find(t=>t.id===uid);
    return m?m.name:uid;
  };

  // ── Section detection ──
  // Primary: alarmLog `section` field. Fallback: CH-value range.
  // p1 SV01-SV02 (CH 59↓36) · p2 SV02-SV03 (CH 59→93)
  const pipeOf=r=>{
    const s=(r.section||'').toUpperCase().trim();
    if(s==='SV01-SV02')return'p1';
    if(s==='SV02-SV03')return'p2';
    if(s==='SV03-SV04')return'p3';
    if(s==='SV04-151KMP')return'p4';
    // Fallback: classify by CH value range
    const ch=parseFloat(r.ch);
    if(!isNaN(ch)){
      if(ch<=59.19)return'p1';    // CH 35.97–59.19
      if(ch<=93.51)return'p2';    // CH 59.19–93.51
      if(ch<=118.4)return'p3';    // CH 93.53–118.40
      if(ch>118.4)return'p4';     // CH 118.40–151.00
    }
    return'p1';
  };
  const PIPE_NAME={p1:'SV01-SV02',p2:'SV02-SV03',p3:'SV03-SV04',p4:'SV04-151KMP'};
  const PIPE_SECTION={p1:'CH 35.97-CH 59.19',p2:'CH 59.19-CH 93.508',p3:'CH 93.53-CH 118.40',p4:'CH 118.40-CH 151.00'};

  const applyFilters=rows=>{
    let r=[...rows].filter(x=>!x.transferred); // exclude transferred-away alarms
    if(fromDate){const ft=new Date(fromDate+'T'+(fromTime||'00:00')+':00').getTime();r=r.filter(x=>(x.setAt||0)>=ft);}
    if(toDate){const tt=new Date(toDate+'T'+(toTime||'23:59')+':59').getTime();r=r.filter(x=>(x.setAt||0)<=tt);}
    if(statusFilter==='active')  r=r.filter(x=>!x.clearedAt);
    if(statusFilter==='cleared') r=r.filter(x=>!!x.clearedAt);
    if(pipeFilter!=='all') r=r.filter(x=>pipeOf(x)===pipeFilter);
    if(personFilter!=='all') r=r.filter(x=>x.assignedTo===personFilter);
    return r.sort((a,b)=>(a.setAt||0)-(b.setAt||0));
  };

  // Re-run preview whenever any filter changes (only if data loaded)
  useEffect(()=>{
    if(allRows.length===0)return;
    const f=applyFilters(allRows);
    setPreview({total:f.length,active:f.filter(r=>!r.clearedAt).length,cleared:f.filter(r=>!!r.clearedAt).length});
  },[fromDate,fromTime,toDate,toTime,statusFilter,pipeFilter,personFilter,allRows]);

  const loadPreview=()=>{
    if(!db){setLoadErr('Firebase not connected');return;}
    setLoading(true);setLoadErr('');
    db.ref(FB_ROOT+'/alarmLog').once('value',snap=>{
      const rows=Object.values(snap.val()||{});
      setAllRows(rows);
      const f=applyFilters(rows);
      setPreview({total:f.length,active:f.filter(r=>!r.clearedAt).length,cleared:f.filter(r=>!!r.clearedAt).length});
      setLoading(false);
    },()=>{setLoadErr('Failed to load. Check connection.');setLoading(false);});
  };

  const handleDownload=()=>{
    const doDownload=rows=>{
      const filtered=applyFilters(rows);
      if(filtered.length===0){showToast('No records match these filters');return;}
      const clearMethodLabel={message_deleted:'Message Deleted',chat_cleared:'Chat Cleared',map_button:'Map Button',manual:'Manual',auto_20m:'Auto (Reached within 20 m)'};
      let sr=1;
      const data=filtered.map(r=>{
        const mins=r.clearedAt&&r.setAt?((r.clearedAt-r.setAt)/60000).toFixed(2):'';
        return{
          'Sr No.'                :sr++,
          'Pipeline'              :PIPE_NAME[pipeOf(r)],
          'OD'                    :r.od!==undefined?String(r.od).replace(/[abcd]$/i,''):'',
          'CH Value'              :r.ch||'',
          'Section / Location'    :PIPE_SECTION[pipeOf(r)],
          'Region on Route'       :regionForAlarm(r),
          'Assigned To'           :mbrName(r.assignedTo),
          'Set By'                :mbrName(r.setBy)||'Control Room',
          'Interlock Set Time'    :fmtDT(r.setAt),
          'Interlock Cleared Time':r.clearedAt?fmtDT(r.clearedAt):'Not cleared yet',
          'Time Taken (min)'      :mins,
          'Distance Travelled'    :r.distTravelledStr||'',
          'Status'                :r.clearedAt?'Cleared':'Active',
          'Cleared By'            :r.resolvedByName||'',
          'Clear Method'          :r.clearMethod?clearMethodLabel[r.clearMethod]||r.clearMethod:'',
          'Clear Alarm Comments'  :r.clearComment||'',
          'Latitude'              :r.lat||'',
          'Longitude'             :r.lng||'',
          'Coordinates'           :r.lat&&r.lng?r.lat+', '+r.lng:''
        };
      });
      const ws=XLSX.utils.json_to_sheet(data);
      ws['!cols']=[{wch:6},{wch:24},{wch:8},{wch:10},{wch:26},{wch:34},{wch:18},{wch:16},
                   {wch:20},{wch:20},{wch:14},{wch:16},{wch:10},{wch:16},{wch:16},
                   {wch:40},{wch:12},{wch:12},{wch:26}];
      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws,'Alarm Sheet');
      const tag=fromDate&&toDate?fromDate+'_to_'+toDate:new Date().toISOString().slice(0,10);
      XLSX.writeFile(wb,'AlarmSheet_'+tag+'.xlsx');
      onClose();
    };

    if(allRows.length>0){doDownload(allRows);}
    else{
      if(!db){showToast('Firebase not connected');return;}
      setLoading(true);
      db.ref(FB_ROOT+'/alarmLog').once('value',snap=>{
        const rows=Object.values(snap.val()||{});
        setAllRows(rows);
        setLoading(false);
        doDownload(rows);
      },()=>{showToast('Failed to load alarm log');setLoading(false);});
    }
  };

  const lwMembers=allTeam.filter(m=>m.id!=='u16'&&/^LW\s/.test(m.name));
  const otherMembers=allTeam.filter(m=>m.id!=='u16'&&!/^LW\s/.test(m.name));

  const inp={padding:'8px 10px',border:'1.5px solid '+gold,borderRadius:8,fontSize:12,
    color:'#1c1c1c',background:'#fffdf5',boxSizing:'border-box',width:'100%'};
  const filterBtn=(active)=>({
    flex:1,padding:'8px 4px',borderRadius:8,fontSize:11,fontWeight:active?700:500,cursor:'pointer',
    border:'1.5px solid '+(active?gold:'#e5e7eb'),
    background:active?'linear-gradient(135deg,'+gold+','+goldL+')':'#f9f9f9',
    color:active?'#1c1c1c':'#555'
  });
  const lbl=t=><div style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase',letterSpacing:.8,marginBottom:5,marginTop:12}}>{t}</div>;

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'center',
      justifyContent:'center',zIndex:9998,padding:16,backdropFilter:'blur(4px)'}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:20,maxWidth:400,width:'100%',
        border:'2px solid '+gold,boxShadow:'0 24px 60px rgba(0,0,0,.5)',
        maxHeight:'92vh',display:'flex',flexDirection:'column',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>

        {/* ── Header ── */}
        <div style={{background:'linear-gradient(135deg,#0d1f3c,#1a3a6b)',padding:'16px 20px',
          borderRadius:'18px 18px 0 0',display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          <div style={{width:42,height:42,borderRadius:11,background:'rgba(214,162,0,.18)',
            border:'1.5px solid '+gold,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>📋</div>
          <div style={{flex:1}}>
            <div style={{fontSize:16,fontWeight:800,color:'#fff',letterSpacing:.3}}>Alarm Sheet</div>
            <div style={{fontSize:10,color:gold,fontWeight:600}}>All interlocks · Full details · Excel export</div>
          </div>
          <button onClick={onClose} style={{background:'rgba(17,24,39,.1)',border:'none',
            borderRadius:8,width:30,height:30,color:'#fff',fontSize:18,cursor:'pointer',
            display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1}}>✕</button>
        </div>

        {/* ── Scrollable filter body ── */}
        <div style={{overflowY:'auto',flex:1,padding:'4px 20px 12px'}}>

          {/* Date range */}
          {lbl('Date Range')}
          <div style={{display:'flex',gap:8,marginBottom:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:'#888',marginBottom:3}}>FROM DATE</div>
              <input type="date" value={fromDate} onChange={e=>setFromDate(e.target.value)} style={inp}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:'#888',marginBottom:3}}>FROM TIME</div>
              <input type="time" value={fromTime} onChange={e=>setFromTime(e.target.value)} style={inp}/>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:'#888',marginBottom:3}}>TO DATE</div>
              <input type="date" value={toDate} onChange={e=>setToDate(e.target.value)} style={inp}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:9,color:'#888',marginBottom:3}}>TO TIME</div>
              <input type="time" value={toTime} onChange={e=>setToTime(e.target.value)} style={inp}/>
            </div>
          </div>

          {/* Status */}
          {lbl('Status')}
          <div style={{display:'flex',gap:6}}>
            {[['all','All'],['active','🔴 Active'],['cleared','✅ Cleared']].map(([v,l])=>(
              <button key={v} onClick={()=>setStatusFilter(v)} style={filterBtn(statusFilter===v)}>{l}</button>
            ))}
          </div>

          {/* Pipeline */}
          {lbl('Pipeline')}
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {[['all','All'],['p1','SV01-SV02'],['p2','SV02-SV03'],['p3','SV03-SV04'],['p4','SV04-151KMP']].map(([v,l])=>(
              <button key={v} onClick={()=>setPipeFilter(v)}
                style={{...filterBtn(pipeFilter===v),flex:'1 1 30%',minWidth:'30%'}}>{l}</button>
            ))}
          </div>

          {/* Assigned person */}
          {lbl('Assigned Person')}
          <select value={personFilter} onChange={e=>setPersonFilter(e.target.value)}
            style={{...inp,cursor:'pointer'}}>
            <option value="all">All persons</option>
            <optgroup label="Line Walkers">
              {lwMembers.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </optgroup>
            <optgroup label="Other Members">
              {otherMembers.map(m=><option key={m.id} value={m.id}>{m.name}</option>)}
            </optgroup>
          </select>

          {/* Load & preview */}
          {lbl('Preview')}
          <button onClick={loadPreview} disabled={loading}
            style={{width:'100%',padding:'9px',borderRadius:9,border:'none',fontSize:12,fontWeight:700,
              cursor:loading?'default':'pointer',
              background:loading?'#9ca3af':'#1a3a6b',color:'#fff',marginBottom:10}}>
            {loading?'Loading...':'🔄  Load & Preview Records'}
          </button>

          {loadErr&&(
            <div style={{fontSize:11,color:'#dc2626',background:'#fef2f2',
              padding:'8px 12px',borderRadius:8,marginBottom:8}}>{loadErr}</div>
          )}

          {preview&&(
            <div style={{background:'linear-gradient(135deg,#f0fdf4,#dcfce7)',
              border:'1.5px solid #86efac',borderRadius:12,padding:'12px 14px',marginBottom:4}}>
              <div style={{fontSize:11,fontWeight:700,color:'#15803d',marginBottom:10}}>
                📊 Preview results
              </div>
              <div style={{display:'flex',gap:8}}>
                {[['Total',preview.total,'#1d4ed8','#dbeafe'],
                  ['Active',preview.active,'#dc2626','#fef2f2'],
                  ['Cleared',preview.cleared,'#16a34a','#f0fdf4']].map(([l,v,tc,bg])=>(
                  <div key={l} style={{flex:1,background:bg,borderRadius:9,padding:'9px 4px',textAlign:'center',border:'1px solid '+tc+'33'}}>
                    <div style={{fontSize:20,fontWeight:800,color:tc,lineHeight:1}}>{v}</div>
                    <div style={{fontSize:9,color:tc,fontWeight:700,marginTop:3}}>{l}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{fontSize:10,color:'#9ca3af',lineHeight:1.55,marginTop:10}}>
            Excel will include 18 columns: Pipeline, OD, CH, Section, Assigned To, Set By,
            Set/Cleared time, Time Taken, Distance, Status, Cleared By, Clear Method,
            Clear Alarm Comments, Coordinates.
          </div>
        </div>

        {/* ── Download footer ── */}
        <div style={{padding:'14px 20px',borderTop:'1px solid #f0f0f0',flexShrink:0,
          background:'#fafafa',borderRadius:'0 0 18px 18px'}}>
          <button onClick={handleDownload} disabled={loading}
            style={{width:'100%',padding:'14px',
              background:loading?'#9ca3af':'linear-gradient(135deg,#16a34a,#22c55e)',
              color:'#fff',border:'none',borderRadius:11,fontSize:14,fontWeight:800,
              cursor:loading?'default':'pointer',boxShadow:'0 4px 14px rgba(22,163,74,.35)',letterSpacing:.3}}>
            {loading?'Preparing...':'📥  Download Alarm Sheet (.xlsx)'}
          </button>
          <div style={{fontSize:10,color:'#9ca3af',textAlign:'center',marginTop:6}}>
            {preview
              ?`${preview.total} record${preview.total!==1?'s':''} will be exported`
              :'Click Download directly or load preview first'}
          </div>
        </div>
      </div>
    </div>
  );
}

function ExcelExportModal({db,onClose}){
  const gold="#d6a200",goldL="#f0c040";
  const _team=ldTeam();
  const mbrName=id=>{const m=_team.find(t=>t.id===id);return m?m.name:(id||"");};
  const PIPELINES=[
    {key:"SV01-SV02",  label:"Section 1 — SV01-SV02"},
    {key:"SV02-SV03",  label:"Section 2 — SV02-SV03"},
    {key:"SV03-SV04",  label:"Section 3 — SV03-SV04"},
    {key:"SV04-151KMP",label:"Section 4 — SV04-151KMP"},
  ];
  const [fromDate,setFromDate]=useState('');
  const [fromTime,setFromTime]=useState('00:00');
  const [toDate,setToDate]=useState('');
  const [toTime,setToTime]=useState('23:59');
  const [selPipes,setSelPipes]=useState(new Set(PIPELINES.map(p=>p.key)));
  const [loading,setLoading]=useState(false);

  const togglePipe=(key)=>setSelPipes(prev=>{
    const next=new Set(prev);
    next.has(key)?next.delete(key):next.add(key);
    return next;
  });

  const fmtDateTime=(ts)=>{
    if(!ts)return"";
    const d=new Date(ts);
    return d.toLocaleDateString()+" "+d.toLocaleTimeString();
  };

  const handleDownload=()=>{
    if(!db){showToast("Firebase not connected");return;}
    if(selPipes.size===0){showToast("Select at least one pipeline");return;}
    setLoading(true);
    db.ref(FB_ROOT+"/alarmLog").once("value",snap=>{
      const all=snap.val()||{};
      let rows=Object.values(all);

      // Pipeline filter
      rows=rows.filter(r=>selPipes.has(r.section||""));

      // Date+time filter
      if(fromDate){
        const fromTs=new Date(fromDate+"T"+(fromTime||"00:00")+":00").getTime();
        rows=rows.filter(r=>(r.setAt||0)>=fromTs);
      }
      if(toDate){
        const toTs=new Date(toDate+"T"+(toTime||"23:59")+":59").getTime();
        rows=rows.filter(r=>(r.setAt||0)<=toTs);
      }

      rows.sort((a,b)=>(a.setAt||0)-(b.setAt||0));

      const sheetData=rows.map(r=>{
        const timeTakenMin=r.clearedAt&&r.setAt?((r.clearedAt-r.setAt)/60000).toFixed(2):"";
        return{
          "OD":r.od!==undefined?String(r.od).replace(/[abcd]$/i,""):"",
          "Section":r.section||"",
          "CH Value":r.ch||"",
          "Region on Route":regionForAlarm(r),
          "Assigned To":mbrName(r.assignedTo),
          "Set By":mbrName(r.setBy)||"Control Room",
          "Interlock Time":fmtDateTime(r.setAt),
          "Interlock Removed Time":r.clearedAt?fmtDateTime(r.clearedAt):"Not cleared yet",
          "Time Taken to Clear (min)":timeTakenMin,
          "Status":r.clearedAt?"Cleared":"Active",
          "Distance Travelled":r.distTravelledStr||"",
          "Resolved Person":r.resolvedByName||"",
          "Clear Alarm Comments":r.clearComment||"",
          "Co-ordinates":(r.lat&&r.lng)?(r.lat+", "+r.lng):""
        };
      });

      if(sheetData.length===0){
        showToast("No alarm records found for this filter");
        setLoading(false);
        return;
      }

      const ws=XLSX.utils.json_to_sheet(sheetData);
      ws['!cols']=[{wch:10},{wch:14},{wch:10},{wch:34},{wch:18},{wch:16},{wch:20},{wch:20},{wch:14},{wch:10},{wch:14},{wch:18},{wch:40},{wch:24}];
      const wb=XLSX.utils.book_new();

/* ══════════════════════════════════════════════════════
   MAIN APP

function App(){
  const [team,setTeam]=useState(()=>{const t=ldTeam()||DEFAULT_TEAM;window.__hpcl_team=t;return t;});
  const [me,setMe]=useState(()=>{
    const s=ldSess();
    if(!s)return null;
    // Always get dp from team (which is saved with dp after saveDp)
    const fromTeam=ldTeam()&&ldTeam().find(m=>m.id===s.id);
    const found=fromTeam?{...s,...fromTeam}:s;
    if(found)window.__hpcl_me_id=found.id;
    return found;
  });
  const [selMember,setSelMember]=useState(null);
  const [loginSearch,setLoginSearch]=useState("");
  const [pinVal,setPinVal]=useState("");
  const [pinErr,setPinErr]=useState("");
  const [msgs,setMsgs]=useState({});
  const [readState,setReadState]=useState({});
  const deliveredSentRef=useRef({});
  const [groups,setGroups]=useState({});
  const [interlocks,setInterlocks]=useState({});
  const [removeIlMsg,setRemoveIlMsg]=useState(null); // alarm msg pending interlock removal (comment panel open)
  const [showGroupInfo,setShowGroupInfo]=useState(false);
  const [activeKey,setActiveKey]=useState("__none__"); // no chat open until one is picked (channels removed)
  const [text,setText]=useState("");
  const [pendingFile,setPendingFile]=useState(null);
  const [pastePrompt,setPastePrompt]=useState(null);
  const tableToImage=(rows)=>{
    const pad=10,fs=13,lh=fs+12;
    const cols=Math.max.apply(null,rows.map(r=>r.length));
    const cvM=document.createElement("canvas").getContext("2d");cvM.font=fs+"px Inter, Arial, sans-serif";
    const wcol=[];
    for(let c=0;c<cols;c++){let w=40;rows.forEach(r=>{const t=(r[c]!=null?String(r[c]):"");w=Math.max(w,cvM.measureText(t).width+pad*2);});wcol.push(Math.min(w,260));}
    const totalW=wcol.reduce((a,b)=>a+b,0),totalH=rows.length*lh,scale=2;
    const cv=document.createElement("canvas");cv.width=totalW*scale;cv.height=totalH*scale;
    const ctx=cv.getContext("2d");ctx.scale(scale,scale);
    ctx.fillStyle="#ffffff";ctx.fillRect(0,0,totalW,totalH);ctx.textBaseline="middle";
    for(let ri=0;ri<rows.length;ri++){
      const y=ri*lh;
      if(ri===0){ctx.fillStyle="#f0c040";ctx.fillRect(0,y,totalW,lh);}
      else if(ri%2===0){ctx.fillStyle="#f8f6f0";ctx.fillRect(0,y,totalW,lh);}
      let x=0;
      for(let c=0;c<cols;c++){
        const t=(rows[ri][c]!=null?String(rows[ri][c]):"");
        ctx.strokeStyle="#e0d8c8";ctx.lineWidth=1;ctx.strokeRect(x,y,wcol[c],lh);
        ctx.fillStyle=ri===0?"#3a2e00":"#1c1c1c";
        ctx.font=(ri===0?"700 ":"")+fs+"px Inter, Arial, sans-serif";
        let tt=t;while(tt.length>1&&ctx.measureText(tt).width>wcol[c]-pad)tt=tt.slice(0,-1);
        ctx.fillText(tt,x+pad/2+2,y+lh/2);x+=wcol[c];
      }
    }
    return cv.toDataURL("image/png");
  };
  const [showSidebar,setShowSidebar]=useState(true);
  const [toast,setToast]=useState("");
  const [showChat,setShowChat]=useState(false);
  const [dpModal,setDpModal]=useState(false);
  const [showLocModal,setShowLocModal]=useState(false);
  const [showPipeMap,setShowPipeMap]=useState(false);
  const [mapTargetMember,setMapTargetMember]=useState(null);
  const [showExcelExport,setShowExcelExport]=useState(false);
  const [showTeamLoc,setShowTeamLoc]=useState(false);
  // ── Smart OD line chooser (Control Room) ──
  const [odChoice,setOdChoice]=useState(null);
  // ── Assign Alarm (bulk upload, Control Room) ──
  const [showAssignAlarm,setShowAssignAlarm]=useState(false);
  // ── Satellite View (Control Room) ──
  const [showSatView,setShowSatView]=useState(false);
  // ── LDS Assign (Control Room) ──
  const [showLdsAssign,setShowLdsAssign]=useState(false);
  const dispatchLdsAssign=(p)=>{
    if(!p||!p.person)return;
    const chatKey=dmKey(me.id,p.person.id);
    const chS=parseFloat(p.ch).toFixed(3);
    // MESSAGE 1 — exact alarm location (alarm-styled)
    const msg1Txt="🛑 LDS LEAK ALARM · CH"+chS+" ("+p.section+")  "+p.pt.txt.replace(/^CH\S*\s+/,"");
    const m1=pushMsg(chatKey,msg1Txt,{isAlarm:true,ldsAlarm:true,assignedTo:p.person.id});
    // AUTO-INTERLOCK the leak point — cleared ONLY when the assigned person
    // physically reaches within 20 m, or by Control Room with a COMPULSORY
    // comment (enforced by the ldsLock flag).
    setTimeout(()=>applyInterlock(m1,true),150);
    setTimeout(()=>{if(db&&m1&&m1.id)db.ref(FB_ROOT+"/interlocks/"+m1.id).update({ldsLock:true});},700);
    if(db&&m1&&m1.id){
      db.ref(FB_ROOT+"/alarmLog/"+m1.id).set({
        id:m1.id,od:p.pt.od,section:AUTO_PIPE_DEFS[p.pipe].section,
        ch:chS,lat:p.pt.lat,lng:p.pt.lng,
        assignedTo:p.person.id,setBy:me.id,setAt:Date.now(),
        msgId:m1.id,chatKey:chatKey,ldsLock:true,ldsAlarm:true,
        clearedAt:null,resolvedBy:null,resolvedByName:null,
        timeTakenStr:null,distTravelledStr:null
      });
    }
    // MESSAGE 2 — every vulnerable point within ±3 km along the route
    let msg2Txt="⚠ VULNERABLE POINTS within ±3 km of the LDS leak alarm (CH"+chS+"):";
    if(p.vps.length===0)msg2Txt+="\n(none in this window)";
    p.vps.forEach((v,i)=>{
      msg2Txt+="\n"+(i+1)+". CH"+v.ch+" — https://maps.google.com/?q="+v.lat+","+v.lng;
    });
    setTimeout(()=>pushMsg(chatKey,msg2Txt,{ldsVpList:true,assignedTo:p.person.id}),450);
    // MAP HIGHLIGHT — unique magenta/violet style on CR's and assignee's maps
    if(db&&m1&&m1.id){
      db.ref(FB_ROOT+"/ldsAlarms/"+m1.id).set({
        id:m1.id,lds:p.lds,section:p.section,ch:chS,pipe:p.pipe,od:p.pt.od,
        lat:p.pt.lat,lng:p.pt.lng,
        assignedTo:p.person.id,assignedToName:p.person.name,
        setBy:me.id,setAt:Date.now(),
        vps:p.vps.map(v=>({ch:v.ch,lat:v.lat,lng:v.lng}))
      });
    }
    // MESSAGE 3 — every alarm of the LAST 24 HOURS within ±3 km along the
    // route, marked ⚠ ACTIVE (interlock not cleared) or ✅ RESOLVED.
    if(db){
      db.ref(FB_ROOT+"/alarmLog").once("value",s=>{
        const log=s.val()||{};
        const cut=Date.now()-24*3600*1000;
        const recent=[];
        Object.keys(log).forEach(k2=>{
          const e=log[k2];
          if(!e||!e.setAt||e.setAt<cut)return;
          const p2=ldsSectionPipe(e.section);if(!p2)return;
          const c2=parseFloat(e.ch);if(!isFinite(c2))return;
          if(ldsRouteDistKm(parseFloat(p.ch),p.pipe,c2,p2)>3)return;
          const mem=team.find(t=>t.id===e.assignedTo);
          recent.push({ch:e.ch,lat:e.lat,lng:e.lng,active:!e.clearedAt,to:(mem&&mem.name)||"",at:e.setAt});
        });
        recent.sort((a,b)=>b.at-a.at);
        let m3="🔔 ALARMS in ±3 km during the LAST 24 HOURS ("+recent.length+"):";
        if(!recent.length)m3+="\n(none)";
        recent.forEach((r,i)=>{
          m3+="\n"+(i+1)+". CH"+r.ch+" — "+(r.active?"⚠ ACTIVE":"✅ RESOLVED")+
            (r.to?" · "+r.to:"")+" · "+new Date(r.at).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+
            " · https://maps.google.com/?q="+r.lat+","+r.lng;
        });
        setTimeout(()=>pushMsg(chatKey,m3,{ldsRecentList:true,assignedTo:p.person.id}),900);
        // add to the highlight record so both maps draw them (teal diamonds)
        if(m1&&m1.id)db.ref(FB_ROOT+"/ldsAlarms/"+m1.id+"/recent").set(
          recent.slice(0,25).map(r=>({ch:r.ch,lat:r.lat,lng:r.lng,active:r.active?1:0,at:r.at,to:r.to}))
        );
        // AUTO-INTERLOCK every one of these 24-h locations for the SAME
        // person — each clears only by them reaching 20 m of THAT point,
        // or Control Room with a compulsory comment.
        if(m1&&m1.id)recent.slice(0,25).forEach((r,i)=>{
          const sid=m1.id+"_r"+i;
          const la=parseFloat(r.lat),ln=parseFloat(r.lng);
          if(!isFinite(la)||!isFinite(ln))return;
          db.ref(FB_ROOT+"/interlocks/"+sid).set({
            lat:String(r.lat),lng:String(r.lng),
            label:"🛑 LDS re-check · CH"+r.ch,
            ch:r.ch,msgId:sid,setBy:me.id,assignedTo:p.person.id,
            setAt:Date.now(),ldsLock:true
          });
          db.ref(FB_ROOT+"/alarmLog/"+sid).set({
            id:sid,od:null,section:AUTO_PIPE_DEFS[p.pipe].section,
            ch:r.ch,lat:r.lat,lng:r.lng,
            assignedTo:p.person.id,setBy:me.id,setAt:Date.now(),
            msgId:sid,chatKey:chatKey,ldsLock:true,ldsRecheck:true,
            clearedAt:null,resolvedBy:null,resolvedByName:null,
            timeTakenStr:null,distTravelledStr:null
          });
        });
      });
    }
    showToast("🛑 LDS alarm assigned to "+p.person.name+" — messages sent");
  };
  const dispatchAutoAlarm=(row)=>{
    const P=AUTO_PIPE_DEFS[row.pipe];if(!P||!row.target)return;
    const od=Math.round(row.od);
    const mk=P.make(od);
    const chatKey=dmKey(me.id,row.target.id);
    const alarmTxt=mk.txt+(row.type?("  · "+row.type+(row.threat?(" ["+row.threat+"]"):"")):"");
    const alarmMsg=pushMsg(chatKey,alarmTxt,
      row.key?{isAlarm:true,assignedTo:row.target.id,autoAlarmId:row.key}
             :{isAlarm:true,assignedTo:row.target.id});
    setTimeout(()=>applyInterlock(alarmMsg,true),150);
    indexAlarmDay(alarmMsg.id,row.target.id,mk.lat,mk.lng);
    setTimeout(()=>checkEscalation(alarmMsg.id,row.target.id,mk.lat,mk.lng,alarmTxt,mk.ch,chatKey),1200);
    if(db&&alarmMsg.id){
      db.ref(FB_ROOT+"/alarmLog/"+alarmMsg.id).set({
        id:alarmMsg.id,od:od,section:P.section,
        ch:mk.ch,lat:mk.lat,lng:mk.lng,
        assignedTo:row.target.id,setBy:me.id,setAt:Date.now(),
        msgId:alarmMsg.id,chatKey:chatKey,
        clearedAt:null,resolvedBy:null,resolvedByName:null,
        timeTakenStr:null,distTravelledStr:null,
        autoAlarmId:row.key||null
      });
      // DEDUPE ledger — per role (LW and NPV are parallel, independent channels).
      // Manual OD assignments (row.manual) have no file ID → no ledger entry.
      if(row.key)db.ref(FB_ROOT+"/autoAlarms/"+row.key+"/"+(row.sendRole||"LW")).set({sentAt:Date.now(),to:row.target.id,toName:row.target.name,od:od,pipe:row.pipe,ch:mk.ch,msgId:alarmMsg.id,type:row.type||"",threat:row.threat||""});
    }
  };

  // ── In-app camera (📷 next to send) ──
  const [showCamera,setShowCamera]=useState(false);
  const camFileRef=useRef(null);
  const openCamera=()=>{
    if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)setShowCamera(true);
    else if(camFileRef.current)camFileRef.current.click(); // native camera-capture fallback
  };
  const onCameraCapture=(dataUrl,geo)=>{
    const size=Math.round(dataUrl.length*3/4);
    setPendingFile({name:"photo_"+new Date().toISOString().replace(/[:.]/g,"-").slice(0,19)+".jpg",type:"image/jpeg",size:size,dataUrl:dataUrl,geo:geo||null});
    setShowCamera(false);
    setTimeout(()=>textRef.current?.focus(),60);
  };
  /* ── Multi-select messages (WhatsApp style) ──
     Right-click / ⋯ a message → "Select messages" → tap messages to
     toggle → bar on top: delete for me · delete for everyone · transfer
     (Control Room, alarm messages with live interlocks) ── */
  const [selMode,setSelMode]=useState(false);
  const [selIds,setSelIds]=useState({});
  const [replyTo,setReplyTo]=useState(null); // message being replied to
  const startReply=useCallback((msg)=>{setReplyTo(msg);setTimeout(()=>{try{textRef.current&&textRef.current.focus();}catch(e){}},50);},[]);
  useEffect(()=>{setReplyTo(null);},[activeKey]);
  const startSelect=useCallback((msg)=>{setSelMode(true);setSelIds({[msg.id]:msg});},[]);
  const toggleSel=(msg)=>setSelIds(p=>{
    const n={...p};
    if(n[msg.id])delete n[msg.id];else n[msg.id]=msg;
    return n;
  });
  const exitSel=()=>{setSelMode(false);setSelIds({});};
  useEffect(()=>{setSelMode(false);setSelIds({});},[activeKey]);
  const selArr=Object.values(selIds);
  const selCanDelEveryone=selArr.length>0&&(me?.id==="u16"||selArr.every(m=>m.senderId===me?.id));
  const selCanTransfer=me?.id==="u16"&&selArr.length>0&&selArr.every(m=>interlocks[m.id]);
  const bulkDeleteForMe=()=>{
    const n=selArr.length;
    selArr.forEach(m=>deleteMsgForMe(m.id));
    showToast("🗑 "+n+" message"+(n===1?"":"s")+" deleted for you");
    exitSel();
  };
  const bulkDeleteForEveryone=()=>{
    let skipped=0,done=0;
    selArr.forEach((m,i)=>{
      const il=interlocks[m.id];
      if(il&&il.escalated){skipped++;return;}   // escalated-active: protected
      setTimeout(()=>deleteMsgForEveryone(m.id),done*140);
      done++;
    });
    showToast("🗑 "+done+" deleted for everyone"+(skipped?(" · "+skipped+" escalated skipped"):""));
    exitSel();
  };
  const bulkTransfer=()=>{
    if(!selCanTransfer)return;
    setTransferMsg({bulk:true,list:selArr,id:"bulk",text:selArr.length+" selected alarm"+(selArr.length===1?"":"s"),assignedTo:null});
  };
  /* ── Delete chat (long-press / right-click on a person) ──
     Person: hides the conversation for THEMSELVES only (like "delete for
     me") — alarms & interlocks are untouched. A new message brings the
     chat back to the list.
     Control Room: deletes the conversation for everyone AND clears every
     alarm interlock that was shared in that chat (logged in alarmLog as
     clearMethod:"chat_deleted"). ── */
  const [hiddenChats,setHiddenChats]=useState({});
  useEffect(()=>{
    if(!me){setHiddenChats({});return;}
    try{setHiddenChats(JSON.parse(localStorage.getItem("brs_hiddenChats_"+me.id)||"{}"));}
    catch(e){setHiddenChats({});}

    // force=true from BOTH the live fix and the ≤5-min gap-bridge, so
    // clearing never depends on which screen is open.
    const autoClearNear=(cla,cln,force)=>{
      if(!force&&window.__hpclMapOpen)return;
      const ils=interlocksLiveRef.current||{};
        Object.keys(ils).forEach(mid=>{
          const il=ils[mid];

            const log=s.val()||{};

            const timeStr=mins>0?(mins+"m "+secs+"s"):(secs+"s");
            const chatKey=log.chatKey||((il.assignedTo&&il.setBy)?["dm",il.assignedTo,il.setBy].sort().join("-"):null);
            if(chatKey)db.ref(fbMsg(chatKey)+"/"+mid).update({

    // Trace points and coverage are stored under today's date key, so at
    // 00:00 a fresh key starts automatically — the trail resets and the
    // morning starts from zero.
    try{
      const _dk=traceDayKey(me&&me.name);

      const st=traceStateRef.current;
      if(st.blocks===undefined)st.blocks=patchBlocksForName(me.name)||null;
      const markCov=(cla,cln)=>{
        if(!st.blocks)return;
        const _bid=coveredBlockAt(st.blocks,cla,cln);
        if(_bid&&!st.covered[_bid]){
          st.covered[_bid]=1;
          db.ref(FB_ROOT+"/coverage/"+_dk+"/"+me.id+"/"+_bid).set(true);
        }
      };
      /* ── 5-MINUTE GAP RULE ──
         lastFix = the previous GPS fix (every fix, even standing still).
         Gap ≤ 5 min → the person was walking with the app alive but fixes
           were sparse: BRIDGE the straight segment between the two fixes —
           every ~15 m step marks patch coverage AND auto-clears any alarm
           within 20 m of the walked-through path (so walking PAST an alarm
           between fixes still resolves it).
         Gap > 5 min → device was offline/off too long: NO bridging — no
           coverage credit, no alarm clears, and the trace stays broken
           (the map renderer splits the trail at >5-min gaps).            */
      const GAP_MS=5*60*1000;

        const bd=escDistM(st.lastFix.lat,st.lastFix.lng,lat,lng);
        if(bd>15&&bd<6000){ // sane bridge only (ignore GPS teleports)
          const steps=Math.min(400,Math.ceil(bd/15));

            const f=k/steps;
            const sLa=st.lastFix.lat+(lat-st.lastFix.lat)*f;
            const sLn=st.lastFix.lng+(lng-st.lastFix.lng)*f;
            markCov(sLa,sLn);
            try{autoClearNear(sLa,sLn,true);}catch(_e){}
          }
        }

      st.lastFix={lat:lat,lng:lng,t:nowT};
      if(!st.last||escDistM(st.last.lat,st.last.lng,lat,lng)>=12){
        st.last={lat:lat,lng:lng};
        db.ref(FB_ROOT+"/traces/"+_dk+"/"+me.id).push({lat:lat,lng:lng,t:nowT});
      }
      markCov(lat,lng);
    }catch(_e){}
    const write=(batt)=>{
      db.ref(FB_ROOT+"/locations/"+me.id).set({
        lat,lng,accuracy:acc,time:Date.now(),

  /* ── File ── */
  const handleFile=e=>{
    const f=e.target.files[0];if(!f)return;

      const raw=ev.target.result;
      // Speed: downscale photos before sending (like the in-app camera) —
      // otherwise every device re-downloads the full-size photo whenever
      // the chat opens.
      if(f.type&&f.type.indexOf("image/")===0){
        const img=new Image();
        img.onload=()=>{
          const MAX=1400,sc=Math.min(1,MAX/Math.max(img.width,img.height));
          if(sc>=1){setPendingFile({name:f.name,type:f.type,size:f.size,dataUrl:raw});return;}
          const cv=document.createElement("canvas");
          cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
          cv.getContext("2d").drawImage(img,0,0,cv.width,cv.height);
          const out=cv.toDataURL("image/jpeg",0.82);
          setPendingFile({name:f.name.replace(/\.[^.]+$/,"")+".jpg",type:"image/jpeg",size:Math.round(out.length*3/4),dataUrl:out});
        };
        img.onerror=()=>setPendingFile({name:f.name,type:f.type,size:f.size,dataUrl:raw});
        img.src=raw;
      }else{
        setPendingFile({name:f.name,type:f.type,size:f.size,dataUrl:raw});
      }
    };

  };

  /* ── Save DP ── */
  const saveDp=dp=>{

  /* ── Create Group ── */
  const parseAlarmCoords=text=>{
    const m=text.match(/([-\d.]+),\s*([-\d.]+)/);

  };
  /* ── ESCALATION CHECK — runs after every Control-Room alarm ──
     Counts today's alarms sent to the same person within 100 m of the
     new alarm location (from alarmLog). At the 10th, the alarm escalates:
     shared with the designated SUP, marker blinks, and the interlock can
     only be cleared by the SUP (within 20 m) or Control Room + comment. */
  // Fast per-day alarm index (speed): escalation counting reads only
  // today's alarms instead of the whole history.
  const indexAlarmDay=(id,assignedTo,lat,lng)=>{
    if(!db||!id)return;
    db.ref(FB_ROOT+"/alarmsByDay/"+alarmDayKey()+"/"+id).set({assignedTo:assignedTo||null,setAt:Date.now(),lat:lat,lng:lng});
  };
  const checkEscalation=(mid,personId,lat,lng,alarmText,chVal,chatKey)=>{
    if(!db||!mid||!personId)return;
    const nLat=parseFloat(lat),nLng=parseFloat(lng);
    if(!isFinite(nLat)||!isFinite(nLng))return;
    const runWith=(log)=>{
      const dayStart=escDayStart();
      let count=0;
      Object.keys(log).forEach(k=>{
        const e=log[k];if(!e)return;
        if(e.transferred)return; // transferred originals excluded (clone counts for new person)
        if(String(e.assignedTo)!==String(personId))return;
        if(!(e.setAt>=dayStart))return;
        const eLat=parseFloat(e.lat),eLng=parseFloat(e.lng);
        if(!isFinite(eLat)||!isFinite(eLng))return;
        if(escDistM(nLat,nLng,eLat,eLng)<=ESC_RADIUS_M)count++;
      });
      if(count<ESC_THRESHOLD)return;
      // Designated SUP is chosen by the ALARM'S CHAINAGE (CH range table).
      // Falls back to CH parsed from the alarm text, then to the person map.
      let supIds=supsForCH(chVal);
      if(!supIds.length){
        const _chm=String(alarmText||"").match(/CH\s*([\d.]+)/i);
        if(_chm)supIds=supsForCH(_chm[1]);
      }
      if(!supIds.length)supIds=DESIGNATED_SUP[personId]||[];
      const supName=[...new Set(supIds.map(sid=>(((team.find(t=>t.id===sid))||{}).name||sid)))].join(" / ")||null;
      const personName=(((team.find(t=>t.id===personId))||{}).name||personId);
      // Mark the live interlock escalated + share it with ALL designated SUPs
      // (marker blinks on their maps). Done ATOMICALLY: if the interlock was
      // auto-cleared during the ~1s window (the assigned person was already
      // within 20 m — not allowed for the 10th alarm), it is REINSTATED in
      // full from the alarmLog. A partial "ghost" entry (no coordinates) is
      // never written — that used to crash marker rendering on every map.
      // Escalate the LIVE interlock. If it was cleared during the ~1s window:
      //   • cleared by Control Room or a SUP → RESPECT the clear (no resurrect)
      //   • auto-cleared at 20 m by the ASSIGNED PERSON themself → REINSTATE
      //     (the assigned person is not allowed to clear the 10th alarm).
      // Never writes a partial "ghost" entry.
      const _logE=log[mid]||{};
      db.ref(FB_ROOT+"/interlocks/"+mid).once("value",ils=>{
        if(ils.exists()){
          db.ref(FB_ROOT+"/interlocks/"+mid).update({escalated:true,supId:supIds[0]||null,supIds:supIds,supName:supName,escCount:count});
          return;
        }
        // Interlock already cleared — check WHO cleared it before reinstating
        db.ref(FB_ROOT+"/alarmLog/"+mid).once("value",ls=>{
          const lg=ls.val()||{};
          const clearedBySelf=lg.clearMethod==="auto_20m"&&String(lg.resolvedBy||"")===String(personId);
          if(!clearedBySelf)return; // CR / SUP clear stands — do not resurrect
          db.ref(FB_ROOT+"/interlocks/"+mid).set({
            lat:(lg.lat!==undefined&&lg.lat!==null)?lg.lat:nLat,
            lng:(lg.lng!==undefined&&lg.lng!==null)?lg.lng:nLng,
            label:String(alarmText||"").split("  ")[0]||"Alarm",
            ch:(lg.ch!==undefined)?lg.ch:null,
            msgId:mid,setBy:me.id,assignedTo:personId,
            setAt:lg.setAt||Date.now(),
            escalated:true,supId:supIds[0]||null,supIds:supIds,supName:supName,escCount:count
          });
          // Undo the disallowed clear on the log + message
          db.ref(FB_ROOT+"/alarmLog/"+mid).update({clearedAt:null,resolvedBy:null,resolvedByName:null,timeTakenStr:null,distTravelledStr:null,clearMethod:null,clearComment:null});
          db.ref(fbMsg(chatKey)+"/"+mid+"/interlockClearedInfo").remove();
        });
      });
      db.ref(FB_ROOT+"/alarmLog/"+mid).update({escalated:true,supId:supIds[0]||null,supIds:supIds,supName:supName,escCount:count,escalatedAt:Date.now()});
      db.ref(fbMsg(chatKey)+"/"+mid).update({escalated:true});
      // ── Share the ACTUAL alarm (with location) with every designated SUP — in HINDI ──
      const mapsLink="https://www.google.com/maps?q="+nLat+","+nLng;
      const hindiMsg="🚨 एस्केलेटेड अलार्म (आज 100 मीटर के दायरे में "+count+" अलार्म)\n"
        +"⚠ अलार्म: "+alarmText+"\n"
        +"📍 अलार्म लोकेशन: "+nLat+", "+nLng+"\n"
        +mapsLink+"\n"
        +"👤 यह अलार्म "+personName+" को भेजा गया था — अब यह आपके साथ साझा किया गया है। अलार्म लोकेशन आपके मैप पर ब्लिंक करती हुई दिखेगी।\n"
        +"🔓 इसे क्लियर करने के लिए अलार्म लोकेशन के 20 मीटर के अंदर पहुँचें। यह अलार्म संबंधित व्यक्ति से क्लियर नहीं होगा — केवल SUP (20 मीटर के अंदर) या कंट्रोल रूम (अनिवार्य कमेंट के साथ) ही क्लियर कर सकता है।";
      supIds.forEach(sid=>{
        pushMsg(dmKey(me.id,sid),hindiMsg,{isAlarm:true,escalationNotice:true,escMsgId:mid,escLat:nLat,escLng:nLng});
      });
      // Escalation note — posted in the same chat, but visible ONLY to
      // Control Room and the designated SUPs (hidden from the assigned person)
      pushMsg(chatKey,"🚨 एस्केलेशन: आज 100 मीटर के दायरे में यह अलार्म नंबर "+count+" है। कंट्रोल रूम ने यह अलार्म "+(supName||"नामित SUP")+" के साथ साझा कर दिया है। यह इंटरलॉक संबंधित व्यक्ति से क्लियर नहीं होगा — केवल SUP (20 मीटर के अंदर पहुँचकर) या कंट्रोल रूम (अनिवार्य कमेंट के साथ) ही इसे क्लियर कर सकता है।",{isSystemNote:true,visibleTo:["u16",...supIds]});
      showToast("🚨 Escalated to "+(supName||"SUP"));
    };
    // today's index first; fall back to the full log only if the index
    // hasn't been populated yet (first day after this upgrade)
    db.ref(FB_ROOT+"/alarmsByDay/"+alarmDayKey()).once("value",s=>{
      const idx=s.val();
      if(idx&&Object.keys(idx).length)runWith(idx);
      else db.ref(FB_ROOT+"/alarmLog").once("value",s2=>runWith(s2.val()||{}));
    });
  };

  // Shared logic — used both for manual long-press interlock AND auto-interlock on send
  const applyInterlock=(msg,silent)=>{
    if(!db)return;
    let coords=parseAlarmCoords(msg.text);
    if(!coords&&msg.p2lat&&msg.p2lng){
      coords={lat:parseFloat(msg.p2lat),lng:parseFloat(msg.p2lng)};
    }
    if(!coords&&msg.p3lat&&msg.p3lng){
      coords={lat:parseFloat(msg.p3lat),lng:parseFloat(msg.p3lng)};
    }
    if(!coords&&msg.p4lat&&msg.p4lng){
      coords={lat:parseFloat(msg.p4lat),lng:parseFloat(msg.p4lng)};
    }
    if(!coords&&msg.p5lat&&msg.p5lng){
      coords={lat:parseFloat(msg.p5lat),lng:parseFloat(msg.p5lng)};
    }
    if(!coords)return;
    const label=msg.text.split("  ")[0]||"Alarm";
    const entry={lat:coords.lat,lng:coords.lng,label,
      ch:(msg.ch!==undefined&&msg.ch!==null)?msg.ch:null,
      msgId:msg.id,setBy:me.id,assignedTo:msg.assignedTo||null,setAt:Date.now()};
    db.ref(FB_ROOT+"/interlocks/"+msg.id).set(entry);
    setInterlocks(prev=>({...prev,[msg.id]:entry}));
    if(!silent)showToast("🔒 Alarm Interlock set");
  };

  const setInterlock=useCallback((msg)=>{
    if(!db){showToast("Firebase not connected");return;}
    let coords=parseAlarmCoords(msg.text);
    if(!coords&&msg.p2lat&&msg.p2lng){
      coords={lat:parseFloat(msg.p2lat),lng:parseFloat(msg.p2lng)};

    if(!coords){showToast("No coordinates in message");return;}

  },[me]);
  const removeInterlock=useCallback((msg)=>{
    if(!db){showToast("Firebase not connected");return;}
    // Open the small comment panel first — actual removal happens on Submit.
    setRemoveIlMsg(msg);
  },[]);
  const doRemoveInterlock=useCallback((msg,comment)=>{
    if(!db){showToast("Firebase not connected");setRemoveIlMsg(null);return;}
    // ESCALATED alarms: comment is COMPULSORY — refuse blank and keep panel open
    const _ilEsc=interlocks[msg.id];
    if(_ilEsc&&(_ilEsc.escalated||_ilEsc.ldsLock)&&!(comment||"").trim()){
      showToast(_ilEsc.ldsLock?"✍ Comment is compulsory to clear an LDS alarm":"✍ Comment is compulsory to clear an ESCALATED alarm");
      return;
    }
    // Capture elapsed time before removing — write small inline info on the message
    const existing=interlocks[msg.id];
    if(existing&&existing.setAt){
      const elapsedMs=Date.now()-existing.setAt;
      const mins=Math.floor(elapsedMs/60000),secs=Math.floor((elapsedMs%60000)/1000);
      const timeStr=mins>0?(mins+"m "+secs+"s"):(secs+"s");
      db.ref(fbMsg(activeKey)+"/"+msg.id).update({
        interlockClearedInfo:{timeStr:timeStr,distStr:null,clearedAt:Date.now(),auto:false}
      });
      // Resolve in alarmLog — manual removal by Control Room (+ optional comment)
      db.ref(FB_ROOT+"/alarmLog/"+msg.id).update({
        clearedAt:Date.now(),resolvedBy:"u16",resolvedByName:"Control Room",
        timeTakenStr:timeStr,distTravelledStr:null,
        clearMethod:"manual",clearComment:comment||""
      });
    }else{
      // Interlock entry missing locally — still record the comment on the log
      db.ref(FB_ROOT+"/alarmLog/"+msg.id).update({clearMethod:"manual",clearComment:comment||""});
    }
    db.ref(FB_ROOT+"/interlocks/"+msg.id).remove();
    // Update local state immediately so star disappears right away
    setInterlocks(prev=>{
      const next={...prev};
      delete next[msg.id];
      return next;
    });
    setRemoveIlMsg(null);
    showToast("🔓 Interlock removed");
  },[interlocks,activeKey]);

  /* ── Transfer alarm message to a different person ──
     Moves the message AND the interlock: the alarm marker disappears from
     the old person's map instantly (interlock removed) and appears on the
     new person's map (fresh interlock assigned to them). Works for all
     5 pipelines. */
  const transferAlarm=useCallback((msg,newPerson)=>{
    if(!db||!msg||!newPerson){showToast("Transfer failed");return;}
    const oldChatKey=activeKey;
    const newChatKey=dmKey(me.id,newPerson.id);
    const msgId=msg.id;

    // Capture the old interlock BEFORE removing it — it holds the exact
    // alarm coordinates + label even if text parsing fails later.
    const oldIl=interlocks[msgId]||null;

    // 1. Delete the alarm message from the current chat (for everyone)
    db.ref(fbMsg(oldChatKey)+"/"+msgId).remove();

    // 2. Remove the active interlock for the old person → alarm marker
    //    vanishes from THEIR map immediately via the interlocks listener
    db.ref(FB_ROOT+"/interlocks/"+msgId).remove();
    setInterlocks(prev=>{const n={...prev};delete n[msgId];return n;});

    // 3. Read the original alarmLog FIRST, then hand everything over
    db.ref(FB_ROOT+"/alarmLog/"+msgId).once("value",snap=>{
      const orig=snap.val()||{};

      // Mark the original alarmLog as transferred (excluded from exports)
      db.ref(FB_ROOT+"/alarmLog/"+msgId).update({
        transferred:true,
        transferredTo:newPerson.id,
        transferredToName:newPerson.name,
        transferredAt:Date.now(),
        clearedAt:Date.now(),
        resolvedBy:"u16",
        resolvedByName:"Control Room",
        clearMethod:"transferred"
      });

      // 4. Push the same alarm message into the new person's chat,
      //    carrying the pipeline coordinate props for ALL 5 pipelines
      const carry={};
      ["p2lat","p2lng","p3lat","p3lng","p4lat","p4lng","p5lat","p5lng"]
        .forEach(k=>{if(msg[k]!==undefined&&msg[k]!==null)carry[k]=msg[k];});
      const newMsg=pushMsg(newChatKey,msg.text,{
        isAlarm:true,
        assignedTo:newPerson.id,
        ...carry
      });

      // 5. Resolve alarm coordinates with layered fallbacks:
      //    old interlock → message text → pX props → original alarmLog
      let coords=(oldIl&&oldIl.lat&&oldIl.lng)?{lat:oldIl.lat,lng:oldIl.lng}:parseAlarmCoords(msg.text);
      if(!coords){
        ["p2","p3","p4","p5"].some(p=>{
          if(msg[p+"lat"]&&msg[p+"lng"]){coords={lat:parseFloat(msg[p+"lat"]),lng:parseFloat(msg[p+"lng"])};return true;}
          return false;
        });
      }
      if(!coords&&orig.lat&&orig.lng)coords={lat:orig.lat,lng:orig.lng};

      // 6. Create a fresh interlock for the new person → alarm marker
      //    appears on THEIR map via the interlocks listener
      if(coords&&newMsg.id){
        const entry={lat:coords.lat,lng:coords.lng,
          label:(oldIl&&oldIl.label)||msg.text.split("  ")[0]||"Alarm",
          msgId:newMsg.id,setBy:me.id,assignedTo:newPerson.id,setAt:Date.now()};
        db.ref(FB_ROOT+"/interlocks/"+newMsg.id).set(entry);
        setInterlocks(prev=>({...prev,[newMsg.id]:entry}));

        // 7. Clone the alarmLog fields for the new person
        db.ref(FB_ROOT+"/alarmLog/"+newMsg.id).set({
          id:newMsg.id,
          od:orig.od||null,
          section:orig.section||null,
          ch:orig.ch||null,
          lat:coords.lat,
          lng:coords.lng,
          assignedTo:newPerson.id,
          setBy:me.id,
          setAt:Date.now(),
          msgId:newMsg.id,
          chatKey:newChatKey,
          clearedAt:null,resolvedBy:null,resolvedByName:null,
          timeTakenStr:null,distTravelledStr:null,
          transferredFrom:msgId,
          transferredFromPerson:msg.assignedTo||null
        });
        // If the alarm was already escalated, escalation follows it to the new person
        if(oldIl&&oldIl.escalated){
          let _sups=supsForCH(orig.ch);
          if(!_sups.length)_sups=DESIGNATED_SUP[newPerson.id]||(oldIl.supIds?Object.values(oldIl.supIds):(oldIl.supId?[oldIl.supId]:[]));
          const _supNm=_sups.map(s=>(((window.__hpcl_team||[]).find(t=>t.id===s)||{}).name||s)).join(" / ")||null;
          db.ref(FB_ROOT+"/interlocks/"+newMsg.id).update({escalated:true,supId:_sups[0]||null,supIds:_sups,supName:_supNm,escCount:oldIl.escCount||ESC_THRESHOLD});
          db.ref(FB_ROOT+"/alarmLog/"+newMsg.id).update({escalated:true,supId:_sups[0]||null,supIds:_sups,supName:_supNm,escalatedAt:Date.now()});
        }
        indexAlarmDay(newMsg.id,newPerson.id,coords.lat,coords.lng);
        if(orig&&orig.setAt)db.ref(FB_ROOT+"/alarmsByDay/"+alarmDayKey(orig.setAt)+"/"+msgId+"/transferred").set(true);
        // Re-evaluate the 10-alarms/100 m rule for the NEW person's history
        setTimeout(()=>checkEscalation(newMsg.id,newPerson.id,coords.lat,coords.lng,(oldIl&&oldIl.label)||"Alarm",orig.ch||null,newChatKey),1200);
      }else{
        showToast("⚠ Transferred, but no coordinates found for the interlock");
      }
    });

    setTransferMsg(null);
    showToast("✅ Alarm transferred to "+newPerson.name);
  },[activeKey,me,interlocks,db]);

    const ref=db.ref(`${FB_ROOT}/userAccess/${aMember.id}/blocked`);
    const handler=snap=>setActivePersonBlocked(!!snap.val());
    ref.on("value",handler);
    return()=>{ref.off("value",handler);setActivePersonBlocked(false);};
  },[me?.id,aMember?.id,fbConnected]);

  /* ── Toggle access for a person (Control Room only) ── */
  const togglePersonAccess=()=>{
    if(!aMember||!db)return;
    const willBlock=!activePersonBlocked;
    db.ref(`${FB_ROOT}/userAccess/${aMember.id}/blocked`).set(willBlock?true:null);
    showToast(willBlock?`🔒 ${aMember.name} access OFF`:`✅ ${aMember.name} access ON`);
  };

  const handleKey=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}};
  const handlePaste=e=>{
    try{
      const cd=e.clipboardData||window.clipboardData;if(!cd)return;
      const t=cd.getData("text/plain")||"";
      const lines=t.replace(/\r/g,"").split("\n").filter((l,i,a)=>!(i===a.length-1&&l===""));
      if(!(t.indexOf("\t")>=0||lines.length>1))return;
      e.preventDefault();
      setPastePrompt({rows:lines.map(l=>l.split("\t")),text:t.replace(/\n+$/,"")});
    }catch(_e){}
  };
  const goToChat=key=>{
    setActiveKey(key);setSearchQ("");setShowSearch(false);
    if(useMobile){
      setShowChat(true);
      // Push history so back button returns to contact list
      history.pushState({chat:true},"","");
    }
  };

  // Re-push history entry when app comes back into focus after Maps
  // (window.location.href=geo: replaces history, so we restore it on resume)
  useEffect(()=>{
    const onResume=()=>{
      if(showChat&&!history.state?.chat){
        history.pushState({chat:true},"","");
      }
    };
    document.addEventListener("visibilitychange",onResume);
    window.addEventListener("focus",onResume);
    return()=>{
      document.removeEventListener("visibilitychange",onResume);
      window.removeEventListener("focus",onResume);
    };
  },[showChat]);

  // Android hardware back button — intercept popstate to go back to list
  useEffect(()=>{
    const onPop=()=>{
      if(showChat){
        setShowChat(false);
      }
    };
    window.addEventListener("popstate",onPop);
    return()=>window.removeEventListener("popstate",onPop);
  },[showChat]);

  // Control Room's client prunes old daily trace/coverage nodes (keeps
  // today + yesterday) so the database never grows unbounded.
  useEffect(()=>{
    if(!db||!me||me.id!=="u16")return;
    for(let i=2;i<=30;i++){
      const d=new Date();d.setDate(d.getDate()-i);
      const k=""+d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2);
      db.ref(FB_ROOT+"/traces/"+k).remove();
      db.ref(FB_ROOT+"/coverage/"+k).remove();
    }
  },[me?.id]);

  // db and firebaseReady are module-level — listen once me is available
  useEffect(()=>{
    if(!me)return;
    if(!db)return;
    // Named handler so off() only removes this specific listener
    const handler=snap=>{
      setInterlocks(snap.val()||{});
    };
    const ref=db.ref(FB_ROOT+"/interlocks");
    ref.on("value",handler);
    return()=>ref.off("value",handler);

  /* ── Chat List Item ── */
  const ChatItem=({label,sublabel,avatarEl,isActive,unread,lastMsg,lastTs,onClick,onCtxMenu})=>(

      onContextMenu={onCtxMenu?(e)=>{e.preventDefault();onCtxMenu(e.clientX,e.clientY);}:undefined}

  /* ══════ DEVICE BLOCKED (kicked because 4th device logged in) ══════ */

                      cursor:"pointer",textAlign:"left",width:"100%"}}>
                    <Avatar member={m} size={34}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#1c1c1c",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.name}</div>

              style={{width:"100%",padding:"13px",border:`2px solid ${pinErr?"#ef4444":C.hpGold}`,borderRadius:12,fontSize:24,letterSpacing:12,textAlign:"center",color:"#1c1c1c",background:"#fdf6e3"}}/>
            {pinErr&&<p style={{fontSize:12,color:"#ef4444",marginTop:6,textAlign:"center"}}>{pinErr}</p>}
            <button onClick={()=>{if(!chosenVM){setPinErr("Select interface first");return;}if(selMember.pin!==pinVal){setPinErr("Incorrect PIN.");setPinVal("");return;}setMe(selMember);}}

              SIGN IN →

        <p style={{fontSize:10,color:"#6b7280",textAlign:"center",marginTop:16}}>© HPCL · BRS ROU Team</p>
        <p style={{fontSize:10.5,color:"#9a7400",textAlign:"center",marginTop:5,fontWeight:600,letterSpacing:.4}}>App designed by - Gaurav S. Patel</p>
      </div>

  /* ══════ SIDEBAR JSX ══════ */

{pastePrompt&&(

      {toast&&<Toast msg={toast}/>}

                🗑 {me.id==="u16"
                     ?(chatCtx.member&&chatCtx.member.isGroup?"Delete chat for everyone":"Delete chat + clear its alarms")
                     :"Delete chat (for me)"}
              </button>
            ):(
              <button className="ctx-item danger" style={{fontWeight:800}} onClick={()=>deleteChat(chatCtx.key)}>
                ⚠ Tap again to confirm
              </button>
            )}
          </div>
        </div>
      )}
      {deviceOff&&<DeviceOffOverlay me={me} ctl={deviceCtl}/>}
      {showAlarmSheet&&<AlarmSheetModal db={db} onClose={()=>setShowAlarmSheet(false)}/>}
      {transferMsg&&<TransferModal msg={transferMsg} currentAssignedId={transferMsg.assignedTo||null} team={team}
        onTransfer={(p)=>{
          if(transferMsg.bulk){
            transferMsg.list.forEach((m,i)=>setTimeout(()=>transferAlarm(m,p),i*650));
            showToast("↪ Transferring "+transferMsg.list.length+" alarms to "+p.name+"…");
            setSelMode(false);setSelIds({});
          }else transferAlarm(transferMsg,p);
        }}
        onClose={()=>setTransferMsg(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
