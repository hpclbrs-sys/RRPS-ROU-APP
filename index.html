// Returns the matched vulnerable CH value, or null if not vulnerable
function vpMatchCH(ch){
  ch=parseFloat(ch);
  if(isNaN(ch))return null;
  for(var i=0;i<VULNERABLE_POINTS.length;i++){
    if(Math.abs(ch-VULNERABLE_POINTS[i])<=VP_TOLERANCE+1e-9)return VULNERABLE_POINTS[i];
  }
  return null;
}
// Accepts an interlock/alarm object — checks its stored CH first,
// then falls back to parsing "CH 947.045" out of the label/text.
function vpMatchAlarm(il){
  if(!il)return null;
  if(il.ch!==undefined&&il.ch!==null){
    var m1=vpMatchCH(il.ch);
    if(m1!==null)return m1;
  }
  var txt=il.label||il.text||"";
  var m=String(txt).match(/CH\s*([\d]{1,4}(?:\.\d+)?)/i);
  return m?vpMatchCH(m[1]):null;
}

/* ── Link / coordinate detector ── */
function parseMessageParts(text){
  // detect URLs and coordinates like 28.6139,77.2090 or 28.6139° N, 77.2090° E
  const urlRegex=/(https?:\/\/[^\s]+|www\.[^\s]+)/gi;
  const coordRegex=/(-?\d{1,3}\.\d+)[°\s,]*[NS]?[,\s]+(-?\d{1,3}\.\d+)[°\s,]*[EW]?/gi;
  const parts=[];
  let last=0;
  const combined=[];
  let m;
  // collect all matches with position
  const urlR=new RegExp(urlRegex.source,"gi");
  const coordR=new RegExp(coordRegex.source,"gi");
  while((m=urlR.exec(text))!==null)combined.push({start:m.index,end:m.index+m[0].length,type:"url",val:m[0]});
  while((m=coordR.exec(text))!==null)combined.push({start:m.index,end:m.index+m[0].length,type:"coord",val:m[0],lat:m[1],lng:m[2]});
  combined.sort((a,b)=>a.start-b.start);
  for(const c of combined){
    if(c.start<last)continue;
    if(c.start>last)parts.push({type:"text",val:text.slice(last,c.start)});
    parts.push(c);
    last=c.end;
  }
  if(last<text.length)parts.push({type:"text",val:text.slice(last)});
  return parts.length?parts:[{type:"text",val:text}];
}

function CopyTip({text,children}){
  const doCopy=e=>{
    e.preventDefault();e.stopPropagation();
    navigator.clipboard&&navigator.clipboard.writeText(text).catch(()=>{});
    const el=e.currentTarget;
    const orig=el.textContent;
    el.textContent="Copied!";
    setTimeout(()=>{el.textContent=orig;},1200);
  };
  return(
    <span className="link-wrap">
      {children}
      <span className="copy-tip" onClick={doCopy}>Copy</span>
    </span>
  );
}

function MsgText({text,isMe}){
  const parts=parseMessageParts(text);
  const lc=isMe?"#0b6bcb":"#1565c0";
  return(
    <div style={{fontSize:14,lineHeight:1.6,wordBreak:"break-word",whiteSpace:"pre-wrap"}}>
      {parts.map((p,i)=>{
        if(p.type==="url"){
          const isMaps=p.val.includes("maps.google")||p.val.includes("google.com/maps")||p.val.includes("goo.gl/maps");
          const href=isMaps?(p.val.startsWith("http")?p.val:"https://"+p.val)
            :"https://www.google.com/search?q="+encodeURIComponent(p.val);
          return(
            <CopyTip key={i} text={p.val}>
              <a href={href} target="_blank" rel="noreferrer" className="chat-link" style={{color:lc}}>{p.val}</a>
            </CopyTip>
          );
        }
        if(p.type==="coord"){
          const geoUri="geo:"+p.lat+","+p.lng+"?q="+p.lat+","+p.lng;
          const webUrl="https://maps.google.com/maps?q="+p.lat+","+p.lng;
          const handleMapClick=e=>{
            e.preventDefault();
            // Use location.href so Maps opens WITHOUT adding extra history entries
            // This means back button from Maps returns DIRECTLY to the app
            const isAndroid=/android/i.test(navigator.userAgent);
            if(isAndroid){
              // Push a temp state BEFORE opening Maps so back stack is preserved
              // Back from Maps will hit this entry, popstate fires, app stays
              history.pushState({chat:true,fromMap:true},"","");
              // Open Maps — use location.href so Maps app intercepts it
              setTimeout(()=>{window.location.href=geoUri;},50);
            }else{
              // On desktop/iOS: open maps in new tab
              window.open(webUrl,"_blank");
            }
          };
          return(
            <CopyTip key={i} text={p.lat+", "+p.lng}>
              <a href={geoUri} onClick={handleMapClick} className="chat-link" style={{color:lc,fontWeight:600}}>Map: {p.val}</a>
            </CopyTip>
          );
        }
        return<span key={i}>{p.val}</span>;
      })}
    </div>
  );
}

/* ── Ticks ── */
function Ticks({status}){
  /* WhatsApp rule:
     "sent"      → single gray ✓   (left the sender's device)
     "delivered" → double gray ✓✓  (received on the recipient's device)
     "read"      → double GREEN ✓✓ (recipient opened the chat)          */
  if(status==="read")
    return<span style={{fontSize:11,color:"#16a34a",marginLeft:3,fontWeight:800}}>✓✓</span>;
  if(status==="delivered")
    return<span style={{fontSize:11,color:C.tickGray,marginLeft:3}}>✓✓</span>;
  return<span style={{fontSize:11,color:C.tickGray,marginLeft:3}}>✓</span>;
}

/* ── Full-screen photo viewer with pinch/scroll zoom ── */
function PhotoViewer({src,name,onClose,canDownload}){
  const [scale,setScale]=useState(1);
  const [tx,setTx]=useState(0);
  const [ty,setTy]=useState(0);
  const touchRef=useRef(null);    // {x,y,tx,ty} — single-finger start
  const pinchRef=useRef(null);    // initial pinch distance
  const tapRef=useRef(0);         // last tap timestamp for double-tap
  const dragRef=useRef(null);     // desktop mouse-drag start

  const MIN=1,MAX=6;
  const clamp=s=>Math.max(MIN,Math.min(MAX,s));
  const reset=()=>{setScale(1);setTx(0);setTy(0);};

  // Android back button closes viewer
  useEffect(()=>{
    history.pushState({photoView:true},"","");
    const fn=()=>onClose();
    window.addEventListener("popstate",fn);
    return()=>window.removeEventListener("popstate",fn);
  },[]);

  const onTouchStart=e=>{
    if(e.touches.length===2){
      // Start pinch
      const dx=e.touches[1].clientX-e.touches[0].clientX;
      const dy=e.touches[1].clientY-e.touches[0].clientY;
      pinchRef.current=Math.sqrt(dx*dx+dy*dy);
      touchRef.current=null;
    } else if(e.touches.length===1){
      pinchRef.current=null;
      const t=e.touches[0];
      // Double-tap detection
      const now=Date.now();
      if(now-tapRef.current<280){
        tapRef.current=0;
        if(scale>1){reset();}else{setScale(2.5);}
        return;
      }
      tapRef.current=now;
      touchRef.current={x:t.clientX,y:t.clientY,tx,ty};
    }
  };

  const onTouchMove=e=>{
    e.preventDefault();
    if(e.touches.length===2&&pinchRef.current!==null){
      // Pinch zoom
      const dx=e.touches[1].clientX-e.touches[0].clientX;
      const dy=e.touches[1].clientY-e.touches[0].clientY;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const ratio=dist/pinchRef.current;
      setScale(s=>{const ns=clamp(s*ratio);if(ns<=1){setTx(0);setTy(0);}return ns;});
      pinchRef.current=dist;
    } else if(e.touches.length===1&&touchRef.current&&scale>1){
      // Pan
      const t=e.touches[0];
      setTx(touchRef.current.tx+(t.clientX-touchRef.current.x));
      setTy(touchRef.current.ty+(t.clientY-touchRef.current.y));
    }
  };

  const onTouchEnd=()=>{pinchRef.current=null;};

  const onWheel=e=>{
    e.preventDefault();
    const factor=e.deltaY<0?1.12:0.89;
    setScale(s=>{const ns=clamp(s*factor);if(ns<=1){setTx(0);setTy(0);}return ns;});
  };
  // Desktop: click-drag to pan when zoomed in
  const onMouseDown=e=>{if(scale<=1)return;e.preventDefault();dragRef.current={x:e.clientX,y:e.clientY,tx,ty};};
  const onMouseMove=e=>{
    if(!dragRef.current||scale<=1)return;
    e.preventDefault();
    setTx(dragRef.current.tx+(e.clientX-dragRef.current.x));
    setTy(dragRef.current.ty+(e.clientY-dragRef.current.y));
  };
  const onMouseUp=()=>{dragRef.current=null;};
  const onDblClick=e=>{e.preventDefault();if(scale>1){reset();}else{setScale(2.5);}};

  return(
    <div style={{position:"fixed",inset:0,zIndex:99999,background:"#000",display:"flex",
      alignItems:"center",justifyContent:"center",touchAction:"none",userSelect:"none"}}
      onWheel={onWheel} onMouseDown={onMouseDown} onMouseMove={onMouseMove}
      onMouseUp={onMouseUp} onMouseLeave={onMouseUp} onDoubleClick={onDblClick}>
      {/* Download — Control Room only */}
      {canDownload&&(
        <button title="Download"
          onClick={()=>{const a=document.createElement("a");a.href=src;a.download=name||"photo.jpg";document.body.appendChild(a);a.click();a.remove();}}
          style={{position:"absolute",top:14,right:66,zIndex:2,background:"rgba(255,255,255,.16)",
            border:"1.5px solid rgba(255,255,255,.4)",borderRadius:"50%",width:42,height:42,
            color:"#fff",fontSize:19,cursor:"pointer",display:"flex",alignItems:"center",
            justifyContent:"center",backdropFilter:"blur(6px)",lineHeight:1}}>
          ⬇
        </button>
      )}
      {/* Close ✕ */}
      <button onClick={onClose}
        style={{position:"absolute",top:14,right:14,zIndex:2,background:"rgba(255,255,255,.16)",
          border:"1.5px solid rgba(255,255,255,.4)",borderRadius:"50%",width:42,height:42,
          color:"#fff",fontSize:22,cursor:"pointer",display:"flex",alignItems:"center",
          justifyContent:"center",backdropFilter:"blur(6px)",lineHeight:1}}>
        ✕
      </button>
      {/* File name */}
      {name&&(
        <div style={{position:"absolute",top:18,left:0,right:60,textAlign:"center",
          fontSize:12,color:"rgba(255,255,255,.78)",fontWeight:600,pointerEvents:"none",
          padding:"0 70px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {name}
        </div>
      )}
      {/* Image with transform */}
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}
        onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
        <img src={src} alt={name||"photo"} draggable={false}
          style={{maxWidth:"100vw",maxHeight:"100vh",objectFit:"contain",
            transform:`translate(${tx}px,${ty}px) scale(${scale})`,
            transformOrigin:"center center",transition:"none",
            cursor:scale>1?(dragRef.current?"grabbing":"grab"):"zoom-in",
            userSelect:"none",display:"block",willChange:"transform"}}/>
      </div>
      {/* Hints */}
      {scale<=1&&(
        <div style={{position:"absolute",bottom:22,left:0,right:0,textAlign:"center",
          fontSize:11,color:"rgba(255,255,255,.5)",pointerEvents:"none"}}>
          Pinch or scroll to zoom · drag to move · Double-tap to zoom in
        </div>
      )}
      {scale>1&&(
        <button onClick={reset}
          style={{position:"absolute",bottom:22,left:"50%",transform:"translateX(-50%)",
            background:"rgba(255,255,255,.14)",border:"1px solid rgba(255,255,255,.35)",
            borderRadius:20,padding:"6px 18px",color:"rgba(255,255,255,.85)",fontSize:11,
            cursor:"pointer",backdropFilter:"blur(4px)"}}>
          Reset zoom ({scale.toFixed(1)}×)
        </button>
      )}
    </div>
  );
}

/* ── Context Menu ── */
function CtxMenu({x,y,onReply,onCopy,onTranslate,onDeleteForMe,onDeleteForEveryone,onSelect,isOwn,canModerate,isAlarmMsg,isInterlocked,onInterlock,onRemoveInterlock,onTransferAlarm,onClose}){
  const ref=useRef();
  useEffect(()=>{
    const fn=e=>{if(ref.current&&!ref.current.contains(e.target))onClose();};
    document.addEventListener("mousedown",fn);document.addEventListener("touchstart",fn);
    return()=>{document.removeEventListener("mousedown",fn);document.removeEventListener("touchstart",fn);};
  },[onClose]);
  const [pos,setPos]=useState({left:x,top:y});
  useEffect(()=>{
    if(!ref.current)return;
    const r=ref.current.getBoundingClientRect();
    let l=x,t=y;
    if(l+r.width>window.innerWidth-8)l=window.innerWidth-r.width-8;
    if(t+r.height>window.innerHeight-8)t=y-r.height-4;
    setPos({left:l,top:t});
  },[x,y]);
  return(
    <div ref={ref} className="ctx-menu" style={{left:pos.left,top:pos.top}}>
      {onReply&&<button className="ctx-item" onClick={()=>{onReply();onClose();}}>↩ Reply</button>}
      <button className="ctx-item" onClick={()=>{onCopy();onClose();}}>Copy message</button>
      <button className="ctx-item" onClick={()=>{onTranslate();onClose();}}>Translate EN / HI</button>
      <button className="ctx-item danger" onClick={()=>{onDeleteForMe();onClose();}}>Delete for Me</button>
      {(isOwn||canModerate)&&(
        <button className="ctx-item danger" onClick={()=>{onDeleteForEveryone();onClose();}}>Delete for Everyone{!isOwn&&canModerate?" (CR)":""}</button>
      )}
      {isOwn&&isAlarmMsg&&!isInterlocked&&(
        <button className="ctx-item" onClick={()=>{onInterlock&&onInterlock();onClose();}}
          style={{color:"#b45309",fontWeight:700}}>🔒 Alarm Interlock</button>
      )}
      {isOwn&&isAlarmMsg&&isInterlocked&&(
        <button className="ctx-item" onClick={()=>{onRemoveInterlock&&onRemoveInterlock();onClose();}}
          style={{color:"#ef4444",fontWeight:700}}>🔓 Remove Interlock</button>
      )}
      {onSelect&&(
        <button className="ctx-item" onClick={()=>{onSelect();onClose();}}>☑ Select messages</button>
      )}
      {isOwn&&isAlarmMsg&&onTransferAlarm&&(
        <button className="ctx-item" onClick={()=>{onTransferAlarm&&onTransferAlarm();onClose();}}
          style={{color:"#d97706",fontWeight:700}}>🔀 Transfer Alarm</button>
      )}
    </div>
  );
}

/* ── Single Message ── */
const Msg=React.memo(function Msg({msg,me,allTeam,onStartReply,onStartSelect,onDeleteForMe,onDeleteForEveryone,onInterlock,onRemoveInterlock,onTransferAlarm,tickStatus,interlocks}){
  const sender=allTeam.find(m=>m.id===msg.senderId);
  const _reply=msg.replyTo||null; // {id,name,text,isImg}
  const isMe=msg.senderId===me.id;
  const [showTrans,setShowTrans]=useState(false);
  const [transText,setTransText]=useState("");
  const [transLoad,setTransLoad]=useState(false);
  const [ctx,setCtx]=useState(null);

  const handleTranslate=async()=>{
    if(showTrans){setShowTrans(false);return;}
    setShowTrans(true);
    if(transText)return;
    setTransLoad(true);
    const txt=msg.text||"";
    const isHindi=/[\u0900-\u097F]/.test(txt);
    const prompt=isHindi
      ?("Translate this Hindi text to English. Reply with only the translation, no explanation:\n"+txt)
      :("Translate this English text to Hindi. Reply with only the Hindi translation, no explanation:\n"+txt);
    try{
      // Use MyMemory free translation API — no key needed, works from browser
      const isHindi2=/[\u0900-\u097F]/.test(txt);
      const langPair=isHindi2?"hi|en":"en|hi";
      const url="https://api.mymemory.translated.net/get?q="+encodeURIComponent(txt)+"&langpair="+langPair;
      const res=await fetch(url);
      const d=await res.json();
      const translated=d.responseData&&d.responseData.translatedText;
      if(!translated||d.responseStatus!==200){
        setTransText("Translation failed. Try again.");
      }else{
        setTransText(translated);
      }
    }catch(err){setTransText("Network error: "+err.message);}
    setTransLoad(false);
  };

  const isInterlocked=!!(interlocks&&interlocks[msg.id]);
  const pressTimerRef=useRef(null);
  const openCtx=e=>{
    e.preventDefault();
    setCtx({x:e.touches?e.touches[0].clientX:e.clientX,y:e.touches?e.touches[0].clientY:e.clientY});
  };
  const onTouchStart=e=>{
    const t=e.touches[0];
    pressTimerRef.current=setTimeout(()=>setCtx({x:t.clientX,y:t.clientY}),600);
  };
  const onTouchEnd=()=>{if(pressTimerRef.current){clearTimeout(pressTimerRef.current);pressTimerRef.current=null;}};
  const copyMsg=()=>navigator.clipboard?.writeText(msg.text||(msg.file?`[File: ${msg.file.name}]`:"")||"").catch(()=>{});

  return(
    <div style={{display:"flex",flexDirection:isMe?"row-reverse":"row",alignItems:"flex-end",gap:7,marginBottom:14,paddingLeft:isMe?52:0,paddingRight:isMe?0:52,animation:"fadeUp .18s ease"}}>
      {!isMe&&sender&&<Avatar member={sender} size={30}/>}
      <div style={{maxWidth:"78%"}}>
        {!isMe&&<div style={{fontSize:10,fontWeight:700,color:sender?.color||C.hpGold,marginBottom:3,paddingLeft:2}}>{sender?.name} <span style={{color:C.textMuted,fontWeight:400}}>· {sender?.role}</span></div>}
        {isInterlocked&&(
          (interlocks&&interlocks[msg.id]&&interlocks[msg.id].escalated)?(
            <div style={{fontSize:10,color:"#ff1744",fontWeight:900,marginBottom:3,display:"flex",alignItems:"center",gap:3,justifyContent:isMe?"flex-end":"flex-start",animation:"escTextBlink 1s linear infinite"}}>🚨 ESCALATED ALARM · shared with {interlocks[msg.id].supName||"SUP"} · clear: SUP (20 m) / C.R. + comment</div>
          ):(
            <div style={{fontSize:10,color:"#b45309",fontWeight:700,marginBottom:3,display:"flex",alignItems:"center",gap:3,justifyContent:isMe?"flex-end":"flex-start"}}>★ Alarm Interlock Active</div>
          )
        )}
        {!isInterlocked&&msg.interlockClearedInfo&&(
          <div style={{fontSize:9,color:"#15803d",fontWeight:700,marginBottom:3,display:"flex",alignItems:"center",gap:3,justifyContent:isMe?"flex-end":"flex-start"}}>
            ✓ Interlock cleared in {msg.interlockClearedInfo.timeStr}
            {msg.interlockClearedInfo.distStr?(" · "+msg.interlockClearedInfo.distStr):""}
          </div>
        )}
        <div onContextMenu={openCtx} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd} onTouchMove={onTouchEnd}
          style={{background:msg.isSystemNote?"#1e3a5f":msg.isAlarm?"#7f0000":(isMe?C.bubbleOut:C.bubbleIn),color:msg.isSystemNote?"#bfdbfe":msg.isAlarm?"#fff":(isMe?C.bubbleOutText:C.bubbleInText),borderRadius:isMe?"16px 16px 4px 16px":"16px 16px 16px 4px",padding:"10px 14px",boxShadow:msg.isAlarm?"0 4px 20px rgba(180,0,0,.6)":(isMe?"0 2px 10px rgba(26,58,46,.4)":"0 1px 4px rgba(0,0,0,.08)"),border:msg.isAlarm?"2px solid #ff1744":(isMe?"1px solid rgba(17,24,39,.06)":"1px solid #ede8dc"),cursor:"context-menu",userSelect:"text"}}>
          {_reply&&(
            <div onClick={(e)=>{e.stopPropagation();try{const el=document.getElementById("msg-"+_reply.id);if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.style.transition="background .2s";const p=el.style.background;el.style.background="rgba(184,134,11,.25)";setTimeout(()=>{el.style.background=p||"";},900);}}catch(_e){}}}
              style={{borderLeft:"3px solid "+(isMe?"#b8860b":"#6d28d9"),background:isMe?"rgba(184,134,11,.10)":"rgba(109,40,217,.07)",borderRadius:6,padding:"5px 8px",marginBottom:5,cursor:"pointer",maxWidth:"100%"}}>
              <div style={{fontSize:10.5,fontWeight:800,color:isMe?"#8a6500":"#5b21b6",marginBottom:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{_reply.name||"Message"}</div>
              <div style={{fontSize:11,color:"#4b5563",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:220}}>{_reply.isImg?"🖼 Photo":(_reply.text||"")}</div>
            </div>
          )}
          {msg.text&&<MsgText text={msg.text} isMe={isMe}/>}
          {msg.file&&<FilePreview file={msg.file} isMe={isMe} canDownload={true}/>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:5,marginTop:3,justifyContent:isMe?"flex-end":"flex-start",paddingLeft:3}}>
          <span style={{fontSize:9,color:C.textMuted}}>{fmtTime(msg.timestamp)}</span>
          {isMe&&<Ticks status={tickStatus}/>}
          <button onClick={openCtx} style={{fontSize:11,color:"#6b7280",background:"none",border:"none",padding:0,cursor:"pointer"}}>•••</button>
        </div>
        {showTrans&&<TranslateBubble loading={transLoad} result={transText}/>}
      </div>
      {ctx&&<CtxMenu x={ctx.x} y={ctx.y} onCopy={copyMsg} onTranslate={handleTranslate}
        onReply={onStartReply?()=>onStartReply(msg):null}
        onSelect={onStartSelect?()=>onStartSelect(msg):null} isOwn={isMe} canModerate={me&&me.id==="u16"} isAlarmMsg={!!msg.isAlarm} isInterlocked={isInterlocked} onInterlock={()=>onInterlock&&onInterlock(msg)} onRemoveInterlock={()=>onRemoveInterlock&&onRemoveInterlock(msg)} onTransferAlarm={onTransferAlarm?()=>onTransferAlarm(msg):null} onDeleteForMe={()=>onDeleteForMe(msg.id)} onDeleteForEveryone={()=>onDeleteForEveryone(msg.id)} onClose={()=>setCtx(null)}/>}
    </div>
  );
},(a,b)=>{
  // Speed: skip re-rendering unchanged message rows. Compare only the
  // fields that affect what a row displays.
  const am=a.msg,bm=b.msg;
  const ail=a.interlocks&&a.interlocks[am.id],bil=b.interlocks&&b.interlocks[bm.id];
  return am.id===bm.id&&am.text===bm.text&&am.escalated===bm.escalated
    &&JSON.stringify(am.interlockClearedInfo||null)===JSON.stringify(bm.interlockClearedInfo||null)
    &&a.tickStatus===b.tickStatus
    &&(!!ail)===(!!bil)
    &&((ail&&ail.escalated)===(bil&&bil.escalated))
    &&((ail&&ail.supName)===(bil&&bil.supName));
});

/* ── More Options Menu (⋮) ── */
/* ══════════════════════════════════════════════════════
   SATELLITE VIEW (Control Room)
   Type an OD → if the OD exists on more than one section, pick the
   section → the latest available satellite imagery of the location opens,
   centred on the OD with a 100 m radius circle, the pipeline drawn for
   context, and switchable imagery sources (Google Satellite / Hybrid /
   Esri — whichever currently has the freshest capture of that area), plus
   a one-tap link to open the same spot in Google Maps.
══════════════════════════════════════════════════════ */
/* Copernicus Data Space — Sentinel-2 L2A instance (Control Room account).
   Change the ID here if a new configuration is ever created. */
const SENTINEL_DEFAULT_ID="16adf395-99dd-4841-959c-784a5b8c960d"; // Sentinel-2 L2A configuration
// The instance ID is FIXED in this file — it cannot be changed from the
// interface, and any value stored on a device by older builds is ignored.
function sentinelInstanceId(){return SENTINEL_DEFAULT_ID;}
function sentinelWmsUrl(){return "https://sh.dataspace.copernicus.eu/ogc/wms/"+sentinelInstanceId();}
/* The user's configuration layers have no style defined ("No style defined
   in TRUE-COLOR"), so we send our own true-colour rendering script with
   every request (SH OGC EVALSCRIPT parameter, base64). This makes the app
   independent of how the dashboard configuration was set up. */
const S2_EVALSCRIPT=
"//VERSION=3\n"+
"function setup(){return{input:[\"B02\",\"B03\",\"B04\"],output:{bands:3}};}\n"+
"function evaluatePixel(s){return[2.5*s.B04,2.5*s.B03,2.5*s.B02];}";
function s2TimeWindow(days){
  const f=d=>d.toISOString().slice(0,10);
  return f(new Date(Date.now()-(days||30)*86400000))+"/"+f(new Date());
}
function SatelliteViewModal({onClose}){
  const [od,setOd]=useState("");
  const [pool,setPool]=useState(null);   // multiple candidate lines
  const [sel,setSel]=useState(null);     // {pipe,od,mk}
  const [layer,setLayer]=useState("sat");
  const [noHit,setNoHit]=useState(false);
  const [s2Layers,setS2Layers]=useState(null);   // all layer names from the instance
  const [s2Layer,setS2Layer]=useState(()=>{try{return localStorage.getItem("brs_s2_layer")||null;}catch(e){return null;}});
  const [s2Mode,setS2Mode]=useState("recent");   // recent | clear
  const [s2NeedScript,setS2NeedScript]=useState(false); // only for style-less layers
  const [s2Err,setS2Err]=useState(null);
  const mapDiv=useRef(null),mapRef=useRef(null),tileRef=useRef(null);
  useEffect(()=>{
    if(layer!=="s2"||s2Layers)return;
    fetch(sentinelWmsUrl()+"?REQUEST=GetCapabilities")
      .then(r=>{if(!r.ok)throw new Error("HTTP "+r.status);return r.text();})
      .then(x=>{
        const names=Array.from(x.matchAll(/<Name>([^<]+)<\/Name>/g)).map(m=>m[1])
          .filter(n=>n&&!/^(WMS|OGC|sh|Sentinel)/i.test(n));
        const uniq=[...new Set(names)];
        setS2Layers(uniq.length?uniq:["TRUE_COLOR","TRUE-COLOR","1_TRUE_COLOR","NATURAL-COLOR"]);
        if(!s2Layer){
          const pick=uniq.find(n=>/TRUE.?COLOR/i.test(n))||uniq.find(n=>/NATURAL/i.test(n))||uniq[0]||"TRUE_COLOR";
          setS2Layer(pick);
        }
      })
      .catch(err=>{
        setS2Err("Could not read the instance's layer list ("+err.message+") — trying common names; pick one below.");
        setS2Layers(["TRUE_COLOR","TRUE-COLOR","1_TRUE_COLOR","NATURAL-COLOR"]);
        if(!s2Layer)setS2Layer("TRUE_COLOR");
      });
  },[layer,s2Layers]);
  const pickS2Layer=(n)=>{setS2Layer(n);setS2Err(null);try{localStorage.setItem("brs_s2_layer",n);}catch(e){}};
  const go=()=>{
    const n=parseInt(String(od).trim(),10);
    setNoHit(false);setPool(null);setSel(null);
    if(!isFinite(n))return;
    const p=Object.keys(AUTO_PIPE_DEFS).map(Number)
      .filter(k=>{const P=AUTO_PIPE_DEFS[k];return n>=P.min&&n<=P.max;});
    if(!p.length){setNoHit(true);return;}
    if(p.length===1)choose(p[0],n);
    else setPool({od:n,pipes:p});
  };
  const choose=(pipe,n)=>{
    const mk=AUTO_PIPE_DEFS[pipe].make(n);
    setPool(null);setSel({pipe:pipe,od:n,mk:mk});
  };
  useEffect(()=>{
    if(!sel)return;
    const init=()=>{
      const L=window.L;if(!L||!mapDiv.current)return;
      const ll=[parseFloat(sel.mk.lat),parseFloat(sel.mk.lng)];
      if(!mapRef.current){
        mapRef.current=L.map(mapDiv.current,{zoomControl:true}).setView(ll,18);
      }else{
        mapRef.current.setView(ll,18);
      }
      if(tileRef.current){try{tileRef.current.remove();}catch(_e){}}
      if(layer==="s2"){
        // Sentinel-2 · last 30 days.
        //   recent → newest pass on top even if cloudy (MAXCC 100)
        //   clear  → least-cloudy pass of the window (PRIORITY=leastCC)
        const p={
          layers:s2Layer||"TRUE_COLOR",format:"image/jpeg",
          time:s2TimeWindow(30),maxcc:100,
          maxZoom:21,maxNativeZoom:16,
          attribution:"Sentinel-2 · Copernicus Data Space"
        };
        // Only override rendering when the layer itself has no style —
        // properly-templated layers reject an injected script.
        if(s2NeedScript)p.evalscript=btoa(S2_EVALSCRIPT);
        if(s2Mode==="clear"){p.priority="leastCC";p.maxcc=80;}
        tileRef.current=L.tileLayer.wms(sentinelWmsUrl(),p).addTo(mapRef.current);
        tileRef.current.on("tileerror",function(ev){
          // Ask the server WHY: fetch the exact failing tile URL and show
          // its error text verbatim (layer not found / invalid instance /
          // no processing units / renderer error …)
          var src=ev&&ev.tile&&ev.tile.src;
          if(!src){setS2Err("Sentinel-2 tiles failed to load.");return;}
          fetch(src).then(function(r){
            return r.text().then(function(t){
              var raw=(t||"").trim();
              var msg=raw.replace(/<[^>]+>/g," ").replace(/\s+/g," ").trim();
              if(!msg)msg=raw.slice(0,220);
              if(/No style defined/i.test(raw)){
                setS2NeedScript(true); // re-adds the layer with our true-colour script
                setS2Err("Layer has no style — applying the app's true-colour rendering…");
                return;
              }
              console.log("Sentinel tile error:",r.status,raw.slice(0,500),src);
              setS2Err("Server says (HTTP "+r.status+"): "+(msg.slice(0,260)||"empty response — full URL logged in console"));
            });
          }).catch(function(e2){
            setS2Err("Tile request blocked before reaching the server ("+e2.message+") — likely a network/firewall issue on this device.");
          });
        });
        tileRef.current.on("tileload",function(){setS2Err(null);});
      }else{
        const urls={
          sat:"https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}",
          hyb:"https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}",
          esri:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        };
        tileRef.current=L.tileLayer(urls[layer],{maxZoom:21,attribution:layer==="esri"?"Esri World Imagery":"Google"}).addTo(mapRef.current);
      }
      if(mapRef.current._ovl){mapRef.current._ovl.forEach(o=>{try{o.remove();}catch(_e){}});}
      const ovl=[];
      const LINES={1:PIPE_PTS,2:P2_COORDS,3:P3_COORDS,4:P4_COORDS};
      const pts=LINES[sel.pipe];
      if(pts)ovl.push(L.polyline(pts,{color:"#ff6600",weight:3,opacity:.9}).addTo(mapRef.current));
      ovl.push(L.circle(ll,{radius:100,color:"#ef4444",weight:2.5,dashArray:"6,6",fillColor:"#ef4444",fillOpacity:.08}).addTo(mapRef.current));
      ovl.push(L.marker(ll,{icon:L.divIcon({
        html:"<div style='background:#dc2626;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:15px;border:2.5px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.5)'>📍</div>",
        iconSize:[30,30],iconAnchor:[15,15],className:""}),zIndexOffset:500}).addTo(mapRef.current)
        .bindPopup("<b>OD "+sel.od+"</b> · CH "+sel.mk.ch+"<br><span style='font-size:11px'>100 m radius shown</span>").openPopup());
      mapRef.current._ovl=ovl;
      setTimeout(()=>{if(mapRef.current)mapRef.current.invalidateSize();},150);
    };
    if(window.L)init();
    else{
      if(!document.querySelector('link[href*="leaflet.css"]')){
        const lk=document.createElement("link");lk.rel="stylesheet";
        lk.href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css";document.head.appendChild(lk);
      }
      const sc=document.createElement("script");
      sc.src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js";
      sc.onload=init;document.head.appendChild(sc);
    }
  },[sel,layer,s2Layer,s2Mode,s2NeedScript]);
  useEffect(()=>()=>{if(mapRef.current){try{mapRef.current.remove();}catch(_e){}mapRef.current=null;}},[]);
  const layerBtn=(k,label)=>(
    <button key={k} onClick={()=>setLayer(k)}
      style={{padding:"5px 12px",borderRadius:8,fontSize:10.5,fontWeight:800,cursor:"pointer",
        border:"1.5px solid "+(layer===k?"#b8860b":"rgba(17,24,39,.18)"),
        background:layer===k?"linear-gradient(135deg,#b8860b,#d6a200)":"transparent",
        color:layer===k?"#fff":"#4b5563"}}>{label}</button>
  );
  return(
    <div style={{position:"fixed",inset:0,zIndex:60000,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"center",justifyContent:"center",padding:10}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:"#ffffff",border:"1px solid rgba(17,24,39,.12)",borderRadius:16,width:"min(760px,97vw)",height:"min(640px,92vh)",display:"flex",flexDirection:"column",overflow:"hidden",boxShadow:"0 12px 48px rgba(0,0,0,.4)"}}>
        <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(17,24,39,.08)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <span style={{fontSize:18}}>🛰️</span>
          <div style={{flex:1}}>
            <div style={{fontSize:14.5,fontWeight:800,color:"#111827"}}>Satellite View — latest imagery by OD</div>
            <div style={{fontSize:10,color:"#6b7280"}}>Enter an OD · pick the section if it exists on more than one · view 100 m radius</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",color:"#6b7280",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{padding:"10px 16px",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid rgba(17,24,39,.06)",flexShrink:0,flexWrap:"wrap"}}>
          <input value={od} onChange={e=>setOd(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")go();}}
            placeholder="OD (e.g. 3000)" inputMode="numeric"

/* ══════════════════════════════════════════════════════
   LDS ASSIGN (Control Room)
   The LDS (Leak Detection System) reports a leak location. On the BRS
   line the pipeline chainage is entered DIRECTLY (CH 35.971–151.0 across
   the four sections SV01–SV02 · SV02–SV03 · SV03–SV04 · SV04–151 KMP).
   Flow: type the CH → the section is detected automatically → every LW /
   SUP / BP / NPV whose patch covers that CH is listed → Control Room
   picks one → TWO messages are sent (exact alarm location + all
   vulnerable points within ±3 km along the route), and the alarm +
   those VPs are highlighted on both maps with a UNIQUE magenta/violet
   style (different from normal alarm and escalation markers).
══════════════════════════════════════════════════════ */
// BRS: one continuous route CH 35.971 → 151.0 split over four sections.
const LDS_CH_MIN=35.971,LDS_CH_MAX=151.0;
function ldsPipeOfCh(ch){
  ch=parseFloat(ch);
  if(!isFinite(ch))return 0;
  if(ch<=59.19)return 1;    // SV01–SV02 (CH 35.971–59.176)
  if(ch<=93.51)return 2;    // SV02–SV03 (CH 59.19–93.508)
  if(ch<=118.4)return 3;    // SV03–SV04 (CH 93.532–118.397)
  return 4;                 // SV04–151 KMP (CH 118.4–151.0)
}
function ldsToAppCH(ch){
  ch=parseFloat(ch);
  if(!isFinite(ch))return null;
  let clamped=false;
  if(ch<LDS_CH_MIN){ch=LDS_CH_MIN;clamped=true;}
  if(ch>LDS_CH_MAX){ch=LDS_CH_MAX;clamped=true;}
  return{ch:ch,pipe:ldsPipeOfCh(ch),clamped:clamped};
}
// System CH → OD → coordinates + region (uses each section's exact
// survey-table calibration, same formulas as the map hover read-out)
function ldsChToPoint(ch,pipe){
  ch=parseFloat(ch);
  let od;
  if(pipe===1)od=Math.round(chToOD(ch));
  else if(pipe===2)od=Math.round(p2ChToOD(ch));
  else if(pipe===3)od=Math.round(p3ChToOD(ch));
  else od=Math.round(p4ChToOD(ch));
  const P=AUTO_PIPE_DEFS[pipe];
  od=Math.max(P.min,Math.min(P.max,od));
  const mk=P.make(od);
  return{od:od,lat:mk.lat,lng:mk.lng,txt:mk.txt,ch:mk.ch,line:P.name};
}
function ldsPipeOfVp(vp){return ldsPipeOfCh(vp);}
// Vulnerable points within ±3 km ALONG THE ROUTE — the BRS route is one
// continuous chainage line, so route distance is simply |ΔCH|.
function ldsVpsNear(ch,pipe){
  const KM=3;
  const out=[];
  VULNERABLE_POINTS.forEach(vp=>{
    const vpPipe=ldsPipeOfVp(vp);
    if(!vpPipe)return;
    if(Math.abs(vp-ch)<=KM){
      const pt=ldsChToPoint(vp,vpPipe);
      out.push({ch:vp,pipe:vpPipe,lat:pt.lat,lng:pt.lng});
    }
  });
  out.sort((a,b)=>a.ch-b.ch);
  return out;
}
/* Route distance (km, chainage-based) between two points anywhere on the
   network — the BRS sections form ONE continuous line, so it is |ΔCH|. */
function ldsRouteDistKm(ch1,pipe1,ch2,pipe2){
  return Math.abs(parseFloat(ch1)-parseFloat(ch2));
}
function ldsSectionPipe(s){
  s=String(s||"");
  if(s==="SV01-SV02")return 1;
  if(s==="SV02-SV03")return 2;
  if(s==="SV03-SV04")return 3;
  if(s==="SV04-151KMP")return 4;
  return 0;
}

          <button disabled={!res||!selP||sentOk}
            onClick={()=>{onAssign({lds:parseFloat(lds),section:res.section,ch:res.ch,pipe:res.pipe,pt:res.pt,vps:res.vps,person:selP});setSentOk(true);}}
            style={{flex:1.7,padding:"11px",border:"none",borderRadius:10,fontSize:12.5,fontWeight:800,color:"#fff",
              cursor:(!res||!selP||sentOk)?"not-allowed":"pointer",

                :(!res||!selP)?"rgba(17,24,39,.12)"
                :"linear-gradient(135deg,#a21caf,#d946ef)"}}>

/* Full pipeline context for any position: nearest of the 4 sections →
   distance (m), section name, CH and OD — used for photo geotagging. */
function geoPipeInfo(lat,lng){
  var pipes=_allPipes();
  var SEC=["SV01-SV02","SV02-SV03","SV03-SV04","SV04-151KMP"];
  var best=Infinity,bPi=-1,bI=0,bT=0;
  for(var pi=0;pi<pipes.length;pi++){
    var p=pipes[pi];if(!p.coords||p.coords.length<2)continue;
    for(var i=0;i<p.coords.length-1;i++){
      var r=ptSegDist(lat,lng,p.coords[i][0],p.coords[i][1],p.coords[i+1][0],p.coords[i+1][1]);
      if(r.d<best){best=r.d;bPi=pi;bI=i;bT=r.t;}
    }
  }
  if(bPi<0)return null;
  var p2=pipes[bPi];
  var dA=p2.cum[bI]+bT*(p2.cum[bI+1]-p2.cum[bI]);
  var ch,od;
  if(bPi===0){od=Math.round(distToOD(dA));ch=odToCHnum(od);}
  else if(bPi===1){od=Math.round(p2DistToOD(dA));ch=p2OdToCHnum(od);}
  else if(bPi===2){od=Math.round(p3DistToOD(dA));ch=p3OdToCHnum(od);}
  else{od=Math.round(p4DistToOD(dA));ch=p4OdToCHnum(od);}
  return{d:Math.round(best),section:SEC[bPi],ch:ch.toFixed(3),od:od};
}

/* ══════════════════════════════════════════════════════
   IN-APP CAMERA (WhatsApp style)
   📷 next to send: opens the device camera inside the app, capture →
   Retake / Use Photo → photo lands in the attachment preview → ➤ sends.
   Photos are downscaled to ≤1280 px JPEG so they send fast.
   If the camera can't start (no permission / unsupported browser),
   the native camera-capture file input opens instead.
══════════════════════════════════════════════════════ */
function CameraModal({onCapture,onClose,onFallback}){
  const videoRef=useRef(null);
  const streamRef=useRef(null);
  const [shot,setShot]=useState(null);
  const [facing,setFacing]=useState("environment");
  const [err,setErr]=useState(false);
  const [tagging,setTagging]=useState(false);   // "adding location…" state
  const geoRef=useRef(null);                    // geotag metadata for the shot
  useEffect(()=>{
    let dead=false;
    const stop=()=>{if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}};
    stop();
    if(!(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia)){setErr(true);onFallback&&onFallback();onClose();return;}
    navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1920},height:{ideal:1080}},audio:false})
      .then(s=>{
        if(dead){s.getTracks().forEach(t=>t.stop());return;}
        streamRef.current=s;
        if(videoRef.current){videoRef.current.srcObject=s;videoRef.current.play().catch(()=>{});}
      })
      .catch(()=>{setErr(true);onFallback&&onFallback();onClose();});
    return()=>{dead=true;stop();};
  },[facing]);
  const doCapture=()=>{
    const v=videoRef.current;if(!v||!v.videoWidth)return;
    const MAX=1280;
    let w=v.videoWidth,ht=v.videoHeight;
    const sc=Math.min(1,MAX/Math.max(w,ht));
    w=Math.round(w*sc);ht=Math.round(ht*sc);
    const cv=document.createElement("canvas");cv.width=w;cv.height=ht;
    const ctx=cv.getContext("2d");
    ctx.drawImage(v,0,0,w,ht);
    geoRef.current=null;
    setTagging(true);

    // ── GEOTAG v2 (GPS Map Camera style): mini-map + full address +
    //    coordinates + local time + pipeline section/CH/OD, burned onto
    //    the photo. Accuracy value intentionally NOT shown.
    const finish=()=>{setShot(cv.toDataURL("image/jpeg",0.85));setTagging(false);};
    // Mini-map: 2×2 tiles around the point → centred crop with a red pin.
    // Tries Esri satellite first, then OpenStreetMap; verifies the canvas is
    // export-safe (CORS) before use, so the photo itself can never break.
    const loadMapThumb=(la,ln)=>new Promise((resolve)=>{
      const z=16,n=Math.pow(2,z);
      const gx=((ln+180)/360)*n*256;
      const latR=la*Math.PI/180;
      const gy=(1-Math.log(Math.tan(latR)+1/Math.cos(latR))/Math.PI)/2*n*256;
      const S=300;
      // the 2×2 tile block that covers the S×S crop window
      const x0=Math.floor((gx-S/2)/256),y0=Math.floor((gy-S/2)/256);
      const SOURCES=[
        (x,y)=>"https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/"+z+"/"+y+"/"+x,
        (x,y)=>"https://tile.openstreetmap.org/"+z+"/"+x+"/"+y+".png"
      ];
      let settled=false;
      const finishWith=(v2)=>{if(!settled){settled=true;resolve(v2);}};
      const trySource=(si)=>{
        if(si>=SOURCES.length){finishWith(null);return;}
        const off=document.createElement("canvas");off.width=512;off.height=512;
        const octx=off.getContext("2d");
        let left=4,bad=false;
        const one=(dx,dy)=>{
          const im=new Image();im.crossOrigin="anonymous";
          im.onload=()=>{try{octx.drawImage(im,dx*256,dy*256);}catch(_e){bad=true;}if(--left===0)fin();};
          im.onerror=()=>{bad=true;if(--left===0)fin();};
          im.src=SOURCES[si](x0+dx,y0+dy);
        };
        const fin=()=>{
          if(bad){trySource(si+1);return;}
          try{
            const crop=document.createElement("canvas");crop.width=S;crop.height=S;
            const cctx=crop.getContext("2d");
            cctx.drawImage(off,(gx-S/2)-x0*256,(gy-S/2)-y0*256,S,S,0,0,S,S);
            // red pin at the exact point
            cctx.fillStyle="#dd2c00";cctx.strokeStyle="#7f1d1d";cctx.lineWidth=3;
            cctx.beginPath();cctx.arc(S/2,S/2-14,13,0,Math.PI*2);cctx.fill();cctx.stroke();
            cctx.beginPath();cctx.moveTo(S/2-9,S/2-6);cctx.lineTo(S/2+9,S/2-6);cctx.lineTo(S/2,S/2+14);cctx.closePath();cctx.fill();cctx.stroke();
            cctx.fillStyle="#fff";cctx.beginPath();cctx.arc(S/2,S/2-14,5,0,Math.PI*2);cctx.fill();
            crop.toDataURL();           // CORS-taint check — throws if unsafe
            finishWith(crop);
          }catch(_e){trySource(si+1);}
        };
        one(0,0);one(1,0);one(0,1);one(1,1);
      };
      trySource(0);
      setTimeout(()=>finishWith(null),9000); // photo must never wait forever
    });
    const drawBandV2=(title,lines,thumb)=>{
      const fsT=Math.max(17,Math.round(w/26));   // big title
      const fs=Math.max(12,Math.round(w/46));
      const lhT=Math.round(fsT*1.35),lh=Math.round(fs*1.5),pad=Math.round(fs*0.9);
      const bh=pad*2+lhT+lh*lines.length;
      const thumbSide=Math.min(bh-pad,Math.round(w*0.26));
      ctx.fillStyle="rgba(0,0,0,.60)";
      ctx.fillRect(0,ht-bh,w,bh);
      let tx0=pad;
      if(thumb){
        const ty0=ht-bh+(bh-thumbSide)/2;
        ctx.save();
        ctx.drawImage(thumb,tx0,ty0,thumbSide,thumbSide);
        ctx.strokeStyle="rgba(255,255,255,.85)";ctx.lineWidth=2;
        ctx.strokeRect(tx0,ty0,thumbSide,thumbSide);
        ctx.restore();
        tx0+=thumbSide+pad;
      }
      const maxW=w-tx0-pad;
      ctx.textBaseline="top";
      ctx.fillStyle="#ffffff";
      ctx.font="800 "+fsT+"px Inter, Arial, sans-serif";
      let t=title;
      while(t.length>4&&ctx.measureText(t).width>maxW)t=t.slice(0,-2);
      ctx.fillText(t,tx0,ht-bh+pad);
      ctx.font="600 "+fs+"px Inter, Arial, sans-serif";
      lines.forEach((ln2,i)=>{
        let s=ln2;
        while(s.length>4&&ctx.measureText(s).width>maxW)s=s.slice(0,-2);
        ctx.fillText(s,tx0,ht-bh+pad+lhT+i*lh);
      });
      ctx.font="700 "+Math.round(fs*0.8)+"px Inter, Arial, sans-serif";
      ctx.fillStyle="rgba(255,255,255,.8)";
      const brand="HPCL BRS ROU · geotagged";
      ctx.fillText(brand,w-pad-ctx.measureText(brand).width,ht-bh-Math.round(fs*1.3));
    };
    if(!(navigator.geolocation&&navigator.geolocation.getCurrentPosition)){finish();return;}
    navigator.geolocation.getCurrentPosition(pos=>{
      const la=pos.coords.latitude,ln=pos.coords.longitude;
      const pi=(typeof geoPipeInfo==="function")?geoPipeInfo(la,ln):null;
      const when=new Date();
      const meta={lat:+la.toFixed(6),lng:+ln.toFixed(6),ts:when.getTime(),
        section:pi?pi.section:null,ch:pi?pi.ch:null,od:pi?pi.od:null,d:pi?pi.d:null,addr:null,title:null};
      const compose=()=>{
        const tzMin=-when.getTimezoneOffset();
        const tzS=(tzMin>=0?"+":"-")+("0"+Math.floor(Math.abs(tzMin)/60)).slice(-2)+":"+("0"+(Math.abs(tzMin)%60)).slice(-2);
        const lines=[];
        if(meta.addr)lines.push(meta.addr);
        lines.push("Lat "+meta.lat+"°  Long "+meta.lng+"°");
        lines.push(when.toLocaleDateString([],{weekday:"long"})+", "+
          ("0"+when.getDate()).slice(-2)+"/"+("0"+(when.getMonth()+1)).slice(-2)+"/"+when.getFullYear()+" "+
          when.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})+" GMT "+tzS);
        if(pi)lines.push("🛢 "+pi.section+" · CH"+pi.ch+" · OD "+pi.od+" · "+(pi.d<1000?pi.d+" m":(pi.d/1000).toFixed(2)+" km")+" from pipeline");
        loadMapThumb(la,ln).then(thumb=>{
          drawBandV2(meta.title||"India",lines,thumb);
          geoRef.current=meta;
          finish();
        });
      };
      const ctl=new AbortController();
      const tmr=setTimeout(()=>ctl.abort(),5000);
      fetch("https://nominatim.openstreetmap.org/reverse?format=jsonv2&accept-language=en&lat="+la+"&lon="+ln,{signal:ctl.signal})
        .then(r=>r.json())
        .then(j=>{
          clearTimeout(tmr);
          const a=(j&&j.address)||{};
          const city=a.city||a.town||a.village||a.hamlet||a.county||"";
          const state=a.state||"";
          meta.title=[city,state,a.country||"India"].filter(Boolean).join(", ");
          // full Google-style address: road/locality, village, district, state, PIN
          const parts=[a.road||a.neighbourhood||a.suburb,
                       (a.village||a.town||a.city)?("Vill. "+(a.village||a.town||a.city)):null,
                       a.county||a.state_district,state,a.postcode].filter(Boolean);
          meta.addr=parts.length?parts.join(", "):(j&&j.display_name?String(j.display_name).slice(0,95):null);
          compose();
        })
        .catch(()=>{clearTimeout(tmr);compose();});
    },()=>{finish();},{enableHighAccuracy:true,timeout:7000,maximumAge:30000});
  };
  if(err)return null;
  return(
    <div style={{position:"fixed",inset:0,zIndex:90000,background:"#000",display:"flex",flexDirection:"column"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",flexShrink:0}}>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.14)",border:"none",color:"#fff",fontSize:16,width:36,height:36,borderRadius:"50%",cursor:"pointer"}}>✕</button>
        <span style={{color:"#fff",fontSize:13,fontWeight:700}}>📷 Camera</span>
        {!shot?(
          <button onClick={()=>setFacing(f=>f==="environment"?"user":"environment")}
            style={{background:"rgba(255,255,255,.14)",border:"none",color:"#fff",fontSize:16,width:36,height:36,borderRadius:"50%",cursor:"pointer"}}>🔄</button>
        ):<div style={{width:36}}/>}
      </div>
      <div style={{flex:1,minHeight:0,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}}>
        {!shot
          ?<video ref={videoRef} autoPlay playsInline muted style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}}/>
          :<img src={shot} alt="captured" style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}}/>}
      </div>
      <div style={{padding:"16px 0 26px",display:"flex",alignItems:"center",justifyContent:"center",gap:26,flexShrink:0}}>
        {tagging&&(
          <div style={{position:"absolute",bottom:110,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.7)",color:"#fff",fontSize:12,fontWeight:700,padding:"7px 16px",borderRadius:16}}>📍 Adding location, address &amp; pipeline details…</div>
        )}
        {!shot?(
          <button onClick={doCapture} disabled={tagging}
            style={{width:70,height:70,borderRadius:"50%",background:"#fff",border:"5px solid rgba(255,255,255,.35)",cursor:tagging?"wait":"pointer",boxShadow:"0 0 0 3px rgba(0,0,0,.4)",opacity:tagging?.5:1}}/>
        ):(
          <>
            <button onClick={()=>{setShot(null);geoRef.current=null;}}
              style={{padding:"12px 22px",borderRadius:24,background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.4)",color:"#fff",fontSize:13.5,fontWeight:700,cursor:"pointer"}}>↺ Retake</button>
            <button onClick={()=>onCapture(shot,geoRef.current)}
              style={{padding:"12px 26px",borderRadius:24,background:"linear-gradient(135deg,#16a34a,#22c55e)",border:"none",color:"#fff",fontSize:13.5,fontWeight:800,cursor:"pointer",boxShadow:"0 3px 14px rgba(34,197,94,.5)"}}>✓ Use Photo</button>
          </>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   SCHEDULED DEVICE OFF (duty hours)
   • LW & SUP : app OFF 18:00 → next day 06:00 (ON 06:00–18:00)
   • NPV      : app OFF 07:00 → 19:00          (ON 19:00–07:00, night duty)
   • BP       : app OFF 01:00 → 13:00          (ON 13:00–01:00)
   • Gaurav (u11), Ninad (u12), Control Room (u16): always ON —
     they go OFF only if Control Room explicitly switches them OFF.
   • Control Room can force any device ON during its OFF period, or
     force it OFF, from the 📴 Device Power panel. "Auto" = schedule.
   • Control Room itself can never be switched OFF (lock-out protection).
   Override stored at deviceControl/{uid} = {mode:"on"|"off",setBy,setAt}.
══════════════════════════════════════════════════════ */
function deviceScheduleFor(member){
  if(!member)return null;
  if(member.id==="u16"||member.id==="u11"||member.id==="u12"||member.id==="u13")return null; // always ON (C.R./officers)
  var n=(member.name||"").trim().toUpperCase();
  if(n.indexOf("NPV")===0)return{start:7*60,end:19*60,label:"NPV duty · ON 19:00–07:00 · OFF 07:00–19:00",onAt:"19:00"};
  if(n.indexOf("BP")===0)return{start:1*60,end:13*60,label:"BP duty · ON 13:00–01:00 · OFF 01:00–13:00",onAt:"13:00"};
  if(n.indexOf("LW")===0||n.indexOf("SUP")===0)return{start:18*60,end:6*60,label:"LW/SUP duty · ON 06:00–18:00 · OFF 18:00–06:00",onAt:"06:00"};
  return null; // unknown role → no schedule (always ON, C.R. can still force OFF)
}
function deviceInOffWindow(sch,d){
  if(!sch)return false;
  var m=d.getHours()*60+d.getMinutes();
  return sch.start<sch.end?(m>=sch.start&&m<sch.end):(m>=sch.start||m<sch.end);
}
function deviceEffectiveOff(member,ctl,d){
  if(!member)return false;
  if(member.id==="u16")return false; // Control Room can never be locked out
  var c=ctl&&ctl[member.id],mode=c&&c.mode;
  if(mode==="off")return true;   // forced OFF by Control Room (any role)
  if(mode==="on")return false;   // forced ON by Control Room (overrides schedule)
  return deviceInOffWindow(deviceScheduleFor(member),d||new Date());
}
function DeviceOffOverlay({me,ctl}){
  const [,setTick]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setTick(x=>x+1),1000);return()=>clearInterval(t);},[]);
  const sch=deviceScheduleFor(me);
  const forced=ctl&&ctl[me.id]&&ctl[me.id].mode==="off";
  const now=new Date();
  const hh=("0"+now.getHours()).slice(-2),mm=("0"+now.getMinutes()).slice(-2),ss=("0"+now.getSeconds()).slice(-2);
  return(
    <div style={{position:"fixed",inset:0,zIndex:100000,background:"linear-gradient(160deg,#e4e9f2,#eef1f6 60%,#e4e9f2)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,textAlign:"center"}}>
      <div style={{fontSize:64,marginBottom:10}}>🌙</div>
      <div style={{fontSize:24,fontWeight:900,color:"#9a7400",letterSpacing:1}}>APP OFF</div>
      <div style={{fontSize:14,fontWeight:700,color:"#111827",marginTop:6}}>{me.name} · {me.role}</div>
      <div style={{fontSize:26,fontWeight:800,color:"#1d4ed8",marginTop:14,fontVariantNumeric:"tabular-nums"}}>{hh}:{mm}:{ss}</div>
      {forced?(
        <div style={{fontSize:12.5,color:"#b91c1c",marginTop:14,maxWidth:340,lineHeight:1.6}}>
          कंट्रोल रूम ने आपका डिवाइस OFF किया है।<br/>Control Room has switched this device OFF.
        </div>
      ):(
        <div style={{fontSize:12.5,color:"#4b5563",marginTop:14,maxWidth:340,lineHeight:1.6}}>
          ड्यूटी समय समाप्त — ऐप निर्धारित समय पर अपने-आप बंद हो गया है।<br/>
          {sch?sch.label:""}<br/>
          {sch&&<span style={{color:"#15803d",fontWeight:800}}>App will switch ON automatically at {sch.onAt}</span>}
        </div>
      )}
      <div style={{fontSize:11.5,color:"#6b7280",marginTop:18,maxWidth:340,lineHeight:1.6,borderTop:"1px solid rgba(17,24,39,.12)",paddingTop:12}}>
        आवश्यकता होने पर कंट्रोल रूम आपका डिवाइस ON कर सकता है।<br/>
        Control Room can switch your device ON if needed.
      </div>
    </div>
  );
}

function LocationCompareModal({otherMember,onClose}){
  const [otherLoc,setOtherLoc]=useState(null);
  const [myCoords,setMyCoords]=useState("");
  const [result,setResult]=useState(null);
  const [status,setStatus]=useState("fetching");

  useEffect(()=>{
    if(!firebaseReady||!db||!otherMember){setStatus("error");return;}
    db.ref(FB_ROOT+"/locations/"+otherMember.id).once("value",snap=>{
      const loc=snap.val();
      if(!loc||!loc.lat){setStatus("no_loc");}
      else{setOtherLoc(loc);setStatus("ready");}
    });
  },[]);

  const calcDist=(la,lo,lb,lg)=>{
    const R=6371000;
    const dA=(lb-la)*Math.PI/180;
    const dB=(lg-lo)*Math.PI/180;
    const x=Math.sin(dA/2)*Math.sin(dA/2)+Math.cos(la*Math.PI/180)*Math.cos(lb*Math.PI/180)*Math.sin(dB/2)*Math.sin(dB/2);
    return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
  };

  const calcDir=(la,lo,lb,lg)=>{
    const dB=(lg-lo)*Math.PI/180;
    const y=Math.sin(dB)*Math.cos(lb*Math.PI/180);
    const x=Math.cos(la*Math.PI/180)*Math.sin(lb*Math.PI/180)-Math.sin(la*Math.PI/180)*Math.cos(lb*Math.PI/180)*Math.cos(dB);
    const br=((Math.atan2(y,x)*180/Math.PI)+360)%360;
    if(br>=337.5||br<22.5)return "North";
    if(br<67.5)return "North-East";
    if(br<112.5)return "East";
    if(br<157.5)return "South-East";
    if(br<202.5)return "South";
    if(br<247.5)return "South-West";
    if(br<292.5)return "West";
    return "North-West";
  };

  const handleCompare=()=>{
    const p=myCoords.trim().split(/[,\s]+/);
    if(p.length<2){alert("Enter coordinates as: lat, lng");return;}
    const la=parseFloat(p[0]),lo=parseFloat(p[1]);
    if(isNaN(la)||isNaN(lo)){alert("Invalid coordinates");return;}
    setResult({dist:calcDist(la,lo,otherLoc.lat,otherLoc.lng),dir:calcDir(la,lo,otherLoc.lat,otherLoc.lng)});
  };

  const gold="#d6a200";
  const goldL="#f0c040";

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.8)",display:"flex",
      alignItems:"center",justifyContent:"center",zIndex:9996,padding:20,backdropFilter:"blur(4px)"}}
      onClick={onClose}>
      <div style={{background:"#fff",borderRadius:20,padding:24,maxWidth:340,width:"100%",
        border:"1.5px solid "+gold}} onClick={e=>e.stopPropagation()}>

        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
          <div style={{width:38,height:38,borderRadius:10,background:"#1565c0",display:"flex",
            alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:800,fontSize:13,flexShrink:0}}>
            LOC
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,color:"#1c1c1c"}}>Compare Location</div>
            <div style={{fontSize:11,color:"#6b7280"}}>with {otherMember?otherMember.name:""}</div>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,color:"#6b7280",cursor:"pointer",lineHeight:1}}>X</button>
        </div>

        {status==="fetching"&&(
          <div style={{textAlign:"center",padding:"24px 0",color:"#6b7280",fontSize:13}}>
            Fetching location of {otherMember?otherMember.name:""}...
          </div>

        {status==="no_loc"&&(
          <div style={{textAlign:"center",padding:"20px 16px",background:"#fff3e0",borderRadius:12,border:"1px solid #ffcc02"}}>
            <div style={{fontSize:36,marginBottom:10}}>NO LOC</div>
            <div style={{fontSize:15,fontWeight:700,color:"#e65100",marginBottom:6}}>Location is not ON</div>
            <div style={{fontSize:12,color:"#bf360c",lineHeight:1.5}}>
              {otherMember?otherMember.name:""} has not shared their location yet.
              They need to tap the Share Loc button in chat first.
            </div>
          </div>
        )}

        {status==="error"&&(
          <div style={{textAlign:"center",padding:"20px 0",color:"#ef4444",fontSize:13}}>
            Could not connect to Firebase. Check internet.
          </div>
        )}

        {(status==="ready"||status==="done")&&otherLoc&&(
          <div>
            <div style={{background:"#e8f5e9",borderRadius:12,padding:"12px 14px",marginBottom:14,border:"1px solid #a5d6a7"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#1b5e20",marginBottom:4,textTransform:"uppercase",letterSpacing:.5}}>

            <input

                color:"#1c1c1c",border:"none",borderRadius:10,fontSize:13,
                fontWeight:700,cursor:"pointer",boxShadow:"0 2px 8px rgba(214,162,0,.3)"}}>
              OK — Calculate Distance and Direction
            </button>

// OD → CH (number) via piecewise-linear interpolation of the survey table
function odToCHnum(od){
  if(od<=ODCH_ODS[0])return ODCH_CHS[0];
  var last=ODCH_ODS.length-1;
  if(od>=ODCH_ODS[last])return ODCH_CHS[last];
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(ODCH_ODS[mid]<=od)lo=mid;else hi=mid;}
  var t=(od-ODCH_ODS[lo])/(ODCH_ODS[hi]-ODCH_ODS[lo]);
  return ODCH_CHS[lo]+t*(ODCH_CHS[hi]-ODCH_CHS[lo]);
}
// CH → OD (CH decreases as OD increases)
function chToOD(ch){
  if(ch>=ODCH_CHS[0])return ODCH_ODS[0];
  var last=ODCH_CHS.length-1;
  if(ch<=ODCH_CHS[last])return ODCH_ODS[last];
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(ODCH_CHS[mid]>=ch)lo=mid;else hi=mid;}
  var dC=ODCH_CHS[lo]-ODCH_CHS[hi];
  var t=dC>0?(ODCH_CHS[lo]-ch)/dC:0;
  return ODCH_ODS[lo]+t*(ODCH_ODS[hi]-ODCH_ODS[lo]);
}
// OD → distance along polyline (m) using per-vertex ODs
function odToDist(od){
  if(od<=PIPE_ODS[0])return 0;
  var last=PIPE_ODS.length-1;
  if(od>=PIPE_ODS[last])return PIPE_TOTAL;
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(PIPE_ODS[mid]<=od)lo=mid;else hi=mid;}
  var dO=PIPE_ODS[hi]-PIPE_ODS[lo];
  var t=dO>0?(od-PIPE_ODS[lo])/dO:0;
  return PIPE_CUM[lo]+t*(PIPE_CUM[hi]-PIPE_CUM[lo]);
}
// distance along polyline → OD
function distToOD(d){
  if(d<=0)return PIPE_ODS[0];
  var last=PIPE_CUM.length-1;
  if(d>=PIPE_TOTAL)return PIPE_ODS[last];
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(PIPE_CUM[mid]<=d)lo=mid;else hi=mid;}
  var dd=PIPE_CUM[hi]-PIPE_CUM[lo];
  var t=dd>0?(d-PIPE_CUM[lo])/dd:0;
  return PIPE_ODS[lo]+t*(PIPE_ODS[hi]-PIPE_ODS[lo]);

function regionForOD(od){

  if(od<=PIPE_ODS[0])idx=0;

  else{var lo=0,hi=last;while(hi-lo>1){var mid=(lo+hi)>>1;if(PIPE_ODS[mid]<=od)lo=mid;else hi=mid;}idx=lo;}

function chainageToCoords(od){
  var last=PIPE_ODS.length-1;
  if(od<=PIPE_ODS[0])return{lat:PIPE_PTS[0][0].toFixed(6),lng:PIPE_PTS[0][1].toFixed(6)};
  if(od>=PIPE_ODS[last])return{lat:PIPE_PTS[last][0].toFixed(6),lng:PIPE_PTS[last][1].toFixed(6)};
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(PIPE_ODS[mid]<=od)lo=mid;else hi=mid;}
  var dO=PIPE_ODS[hi]-PIPE_ODS[lo];

function p2OdToCHnum(od){
  if(od<=P2_ODCH_ODS[0])return P2_ODCH_CHS[0];
  var last=P2_ODCH_ODS.length-1;
  if(od>=P2_ODCH_ODS[last])return P2_ODCH_CHS[last];
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(P2_ODCH_ODS[mid]<=od)lo=mid;else hi=mid;}
  var t=(od-P2_ODCH_ODS[lo])/(P2_ODCH_ODS[hi]-P2_ODCH_ODS[lo]);
  return P2_ODCH_CHS[lo]+t*(P2_ODCH_CHS[hi]-P2_ODCH_CHS[lo]);
}
function p2ChToOD(ch){
  if(ch<=P2_ODCH_CHS[0])return P2_ODCH_ODS[0];
  var last=P2_ODCH_CHS.length-1;
  if(ch>=P2_ODCH_CHS[last])return P2_ODCH_ODS[last];
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(P2_ODCH_CHS[mid]<=ch)lo=mid;else hi=mid;}
  var dC=P2_ODCH_CHS[hi]-P2_ODCH_CHS[lo];
  var t=dC>0?(ch-P2_ODCH_CHS[lo])/dC:0;
  return P2_ODCH_ODS[lo]+t*(P2_ODCH_ODS[hi]-P2_ODCH_ODS[lo]);
}
function p2OdToDist(od){
  if(od<=P2_ODS[0])return 0;
  var last=P2_ODS.length-1;
  if(od>=P2_ODS[last])return P2_TOTAL;
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(P2_ODS[mid]<=od)lo=mid;else hi=mid;}
  var dO=P2_ODS[hi]-P2_ODS[lo];
  var t=dO>0?(od-P2_ODS[lo])/dO:0;
  return P2_CUM[lo]+t*(P2_CUM[hi]-P2_CUM[lo]);
}
function p2DistToOD(d){
  if(d<=0)return P2_ODS[0];
  var last=P2_CUM.length-1;
  if(d>=P2_TOTAL)return P2_ODS[last];
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(P2_CUM[mid]<=d)lo=mid;else hi=mid;}
  var dd=P2_CUM[hi]-P2_CUM[lo];
  var t=dd>0?(d-P2_CUM[lo])/dd:0;
  return P2_ODS[lo]+t*(P2_ODS[hi]-P2_ODS[lo]);
}

function p2RegionForOD(od){

  else{var lo=0,hi=last;while(hi-lo>1){var mid=(lo+hi)>>1;if(P2_ODS[mid]<=od)lo=mid;else hi=mid;}idx=lo;}
  var l=0,h=P2_REGION_RUNS.length/2-1;

function p2OdToCoords(od){
  var last=P2_ODS.length-1,lat,lng;
  if(od<=P2_ODS[0]){lat=P2_COORDS[0][0];lng=P2_COORDS[0][1];}
  else if(od>=P2_ODS[last]){lat=P2_COORDS[last][0];lng=P2_COORDS[last][1];}
  else{
    var lo=0,hi=last;
    while(hi-lo>1){var mid=(lo+hi)>>1;if(P2_ODS[mid]<=od)lo=mid;else hi=mid;}
    var dO=P2_ODS[hi]-P2_ODS[lo];
    var t=dO>0?(od-P2_ODS[lo])/dO:0;
    lat=P2_COORDS[lo][0]+t*(P2_COORDS[hi][0]-P2_COORDS[lo][0]);

  }

}

function p3OdToCHnum(od){
  if(od<=P3_ODCH_ODS[0])return P3_ODCH_CHS[0];
  var last=P3_ODCH_ODS.length-1;
  if(od>=P3_ODCH_ODS[last])return P3_ODCH_CHS[last];
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(P3_ODCH_ODS[mid]<=od)lo=mid;else hi=mid;}
  var t=(od-P3_ODCH_ODS[lo])/(P3_ODCH_ODS[hi]-P3_ODCH_ODS[lo]);
  return P3_ODCH_CHS[lo]+t*(P3_ODCH_CHS[hi]-P3_ODCH_CHS[lo]);
}
function p3ChToOD(ch){
  // CH descends as OD rises in this section
  if(ch>=P3_ODCH_CHS[0])return P3_ODCH_ODS[0];
  var last=P3_ODCH_CHS.length-1;
  if(ch<=P3_ODCH_CHS[last])return P3_ODCH_ODS[last];
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(P3_ODCH_CHS[mid]>=ch)lo=mid;else hi=mid;}
  var dC=P3_ODCH_CHS[lo]-P3_ODCH_CHS[hi];
  var t=dC>0?(P3_ODCH_CHS[lo]-ch)/dC:0;
  return P3_ODCH_ODS[lo]+t*(P3_ODCH_ODS[hi]-P3_ODCH_ODS[lo]);
}
function p3OdToDist(od){
  if(od<=P3_ODS[0])return 0;
  var last=P3_ODS.length-1;
  if(od>=P3_ODS[last])return P3_TOTAL;
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(P3_ODS[mid]<=od)lo=mid;else hi=mid;}
  var dO=P3_ODS[hi]-P3_ODS[lo];
  var t=dO>0?(od-P3_ODS[lo])/dO:0;
  return P3_CUM[lo]+t*(P3_CUM[hi]-P3_CUM[lo]);
}
function p3DistToOD(d){
  if(d<=0)return P3_ODS[0];
  var last=P3_CUM.length-1;
  if(d>=P3_TOTAL)return P3_ODS[last];
  var lo=0,hi=last;
  while(hi-lo>1){var mid=(lo+hi)>>1;if(P3_CUM[mid]<=d)lo=mid;else hi=mid;}
  var dd=P3_CUM[hi]-P3_CUM[lo];
  var t=dd>0?(d-P3_CUM[lo])/dd:0;
  return P3_ODS[lo]+t*(P3_ODS[hi]-P3_ODS[lo]);
}
function p3DistToCHLabel(d){return"CH"+p3OdToCHnum(p3DistToOD(d)).toFixed(3);}
function p3RegionForOD(od){
  var last=P3_ODS.length-1,idx;
  if(od<=P3_ODS[0])idx=0;
  else if(od>=P3_ODS[last])idx=last;
  else{var lo=0,hi=last;while(hi-lo>1){var mid=(lo+hi)>>1;if(P3_ODS[mid]<=od)lo=mid;else hi=mid;}idx=lo;}
  var l=0,h=P3_REGION_RUNS.length/2-1;
  while(l<h){var m=Math.ceil((l+h)/2);if(P3_REGION_RUNS[m*2]<=idx)l=m;else h=m-1;}
  return P3_REGION_LIST[P3_REGION_RUNS[l*2+1]]||"";
}
function p3OdToCoords(od){
  var last=P3_ODS.length-1,lat,lng;
  if(od<=P3_ODS[0]){lat=P3_COORDS[0][0];lng=P3_COORDS[0][1];}
  else if(od>=P3_ODS[last]){lat=P3_COORDS[last][0];lng=P3_COORDS[last][1];}
  else{
    var lo=0,hi=last;
    while(hi-lo>1){var mid=(lo+hi)>>1;if(P3_ODS[mid]<=od)lo=mid;else hi=mid;}
    var dO=P3_ODS[hi]-P3_ODS[lo];
    var t=dO>0?(od-P3_ODS[lo])/dO:0;
    lat=P3_COORDS[lo][0]+t*(P3_COORDS[hi][0]-P3_COORDS[lo][0]);
    lng=P3_COORDS[lo][1]+t*(P3_COORDS[hi][1]-P3_COORDS[lo][1]);
  }
  return{lat:lat.toFixed(6),lng:lng.toFixed(6),region:p3RegionForOD(od)};
}
function p3OdToCH(od){return p3OdToCHnum(od).toFixed(3);}
function isValidChainage3(txt){
  const t=txt.trim();
  if(!/^\d+b$/i.test(t))return false;
  const n=parseInt(t,10);
  return n>=P3_OD_MIN&&n<=P3_OD_MAX;
}
// Clip SV03-SV04 points to a CH range (CH decreases with distance here)
function clipP3ToCH(pMin,pMax){
  if(pMax<=P3_CH_START||pMin>=P3_CH_END)return[];
  var cA=Math.max(pMin,P3_CH_START),cB=Math.min(pMax,P3_CH_END);
  var dA=p3OdToDist(p3ChToOD(cB)),dB=p3OdToDist(p3ChToOD(cA)); // higher CH = lower OD = smaller dist
  var mn=Math.max(0,Math.min(dA,dB)),mx=Math.min(P3_TOTAL,Math.max(dA,dB));
  var s=0,e=P3_CUM.length-2;
  for(var i=0;i<P3_CUM.length-1;i++){if(P3_CUM[i]<=mn)s=i;}
  for(var j=P3_CUM.length-2;j>=0;j--){if(P3_CUM[j]<=mx){e=j;break;}}
  return P3_COORDS.slice(s,Math.min(e+2,P3_COORDS.length));
}

// Computes a line parallel to a given polyline, offset perpendicularly
// by a fixed distance (in meters) — used to draw 20m buffer-zone lines
// on either side of each pipeline. sign=+1 for one side, -1 for the other.
function offsetPolyline(coords,offsetMeters,sign){
  var R=6371000,out=[];
  for(var i=0;i<coords.length;i++){
    var prev=coords[Math.max(0,i-1)];
    var next=coords[Math.min(coords.length-1,i+1)];
    // Direction vector of the line at this point (in meters, local flat approx)
    var cosLat=Math.cos(coords[i][0]*Math.PI/180);
    var dx=(next[1]-prev[1])*cosLat*R*Math.PI/180;
    var dy=(next[0]-prev[0])*R*Math.PI/180;
    var len=Math.sqrt(dx*dx+dy*dy);
    if(len===0){out.push(coords[i]);continue;}
    // Perpendicular unit vector, rotated 90 degrees
    var px=-dy/len,py=dx/len;
    var offX=px*offsetMeters*sign,offY=py*offsetMeters*sign;
    // Convert meter offset back to lat/lng
    var newLat=coords[i][0]+(offY/R)*(180/Math.PI);
    var newLng=coords[i][1]+(offX/(R*cosLat))*(180/Math.PI);
    out.push([newLat,newLng]);
  }
  return out;
}

      else if(ch===","){row.push(cur);cur="";}
      else if(ch==="\n"||ch==="\r"){
        if(ch==="\r"&&text[i+1]==="\n")i++;
        row.push(cur);cur="";
        if(row.length>1||row[0]!=="")rows.push(row);
        row=[];
      }else cur+=ch;
    }
  }
  if(cur!==""||row.length){row.push(cur);if(row.length>1||row[0]!=="")rows.push(row);}
  return rows;
}
function autoAlarmRowsFromTable(rows){
  if(!rows.length)return[];
  const hdr=rows[0].map(x=>String(x||"").trim().toLowerCase());
  const col=(...names)=>{
    for(const n of names){const i=hdr.findIndex(x=>x===n||x.indexOf(n)>=0);if(i>=0)return i;}
    return -1;
  };
  const cId=col("id"),cFib=col("fibre line","fiber line","fibre","fiber","line");
  const cPos=col("position (m)","position"),cLat=col("latitude"),cLng=col("longitude");
  const cType=col("type"),cThr=col("threat level","threat");
  const out=[];
  for(let i=1;i<rows.length;i++){
    const r=rows[i];if(!r||!r.length)continue;
    const id=String(cId>=0?(r[cId]||""):"").trim();
    if(!id)continue;
    out.push({
      id:id,
      fibre:cFib>=0?String(r[cFib]||"").trim():"",
      od:parseFloat(cPos>=0?r[cPos]:""),
      lat:parseFloat(cLat>=0?r[cLat]:""),
      lng:parseFloat(cLng>=0?r[cLng]:""),
      type:cType>=0?String(r[cType]||"").trim():"",
      threat:cThr>=0?String(r[cThr]||"").trim():""
    });
  }
  return out;
}
function classifyAutoAlarmRow(raw,team,sentIds,liveInterlocks,rolePrefix){
  rolePrefix=rolePrefix||"LW";
  const row={...raw};
  row.key=String(row.id).replace(/[.#$/\[\]]/g,"_");
  // DEDUPE RULE (PER ROLE): LW and NPV are independent parallel channels —
  // the same alarm ID can be sent once to an LW AND once to an NPV.
  // Within a role, an already-sent ID is a duplicate ONLY while that
  // send's interlock is still ACTIVE; once cleared (person/SUP/Control
  // Room/chat deleted) the same ID becomes sendable again for that role.
  row.sendRole=rolePrefix;
  const prevAll=sentIds&&sentIds[row.key];
  const prev=prevAll?(prevAll[rolePrefix]||null):null;
  if(prev){
    const live=liveInterlocks&&prev.msgId&&liveInterlocks[prev.msgId];
    if(live){row.status="duplicate";row.info=rolePrefix+" interlock still active · sent "+new Date(prev.sentAt).toLocaleString();return row;}
    row.resend=true; // previously sent to this role but cleared — goes out as new
  }
  if(!isFinite(row.od)){row.status="bad";row.info="no Position (m)";return row;}
  let pipe=fibreToPipe(row.fibre);
  if(!pipe&&isFinite(row.lat)&&isFinite(row.lng)){
    // fallback: among pipelines whose OD range contains this OD, pick the
    // one whose OD→coords lands nearest the file's coordinates
    let best=null,bd=1e18;
    Object.keys(AUTO_PIPE_DEFS).forEach(k=>{
      const P=AUTO_PIPE_DEFS[k];
      if(row.od<P.min||row.od>P.max)return;
      const m=P.make(Math.round(row.od));
      const d=escDistM(row.lat,row.lng,parseFloat(m.lat),parseFloat(m.lng));
      if(d<bd){bd=d;best=+k;}
    });
    if(best&&bd<500)pipe=best;
  }
  if(!pipe){row.status="bad";row.info="unknown fibre line: "+(row.fibre||"—");return row;}
  const P=AUTO_PIPE_DEFS[pipe];
  if(row.od<P.min||row.od>P.max){row.status="bad";row.info="OD "+row.od+" outside "+P.name;return row;}
  row.pipe=pipe;
  const mk=P.make(Math.round(row.od));
  row.ch=mk.ch;row.mkLat=mk.lat;row.mkLng=mk.lng;
  const tgt=autoTargetForCH(team,mk.ch,rolePrefix);
  if(!tgt){row.status="no-lw";row.info="no "+rolePrefix+" patch covers CH "+mk.ch;return row;}
  row.target=tgt;row.status="ready";
  row.info=tgt.name+(row.resend?" · re-send (previous interlock was cleared)":"");
  return row;
}
function AssignAlarmModal({team,db,me,onDispatch,onClose}){

  useEffect(()=>{
    if(mode!=="manual")return;
    const t=setTimeout(()=>{try{mOdRef.current&&mOdRef.current.focus();}catch(_e){}},180);
    return()=>clearTimeout(t);

    try{
      const s=String(vRaw!==undefined?vRaw:(mOdRef.current?mOdRef.current.value:mOd)).trim();
      const n=parseInt(s,10);
      setMPool(null);setMSel(null);setMPerson(null);setMSent(false);

      const p=Object.keys(AUTO_PIPE_DEFS).map(Number)
        .filter(k=>{const P=AUTO_PIPE_DEFS[k];return n>=P.min&&n<=P.max;});

  const mChoose=(pipe,n)=>{
    const mk=AUTO_PIPE_DEFS[pipe].make(n);

  const mPersons=(()=>{

      const pr=parsePatchRanges(t.name);

    });

    if(!mSel||!mPerson||mSent)return;

            {done?"✅ All sent":busy?("⏳ Sending… "+Object.keys(sent).length+"/"+ready.length):("🚨 Send "+ready.length+" new alarm"+(ready.length===1?"":"s")+" to "+role)}
          </button>

/* ══════════════════════════════════════════════════════
   DAILY MOVEMENT TRACES + 100 m PATCH COVERAGE
   • Every person's positions are recorded through the day under
     traces/{YYYYMMDD}/{uid} — a new day key starts empty, so the
     trail automatically resets at 00:00 and restarts in the morning.
   • Each person's patch is divided (in the background) into 100 m
     blocks. Entering the 25 m geofence corridor anywhere inside a
     block marks that block covered → coverage/{YYYYMMDD}/{uid}/{blockId}.
   • On the map: dotted purple line = today's movement; yellow blocks =
     not yet covered; green = covered; % badge shows live coverage.
══════════════════════════════════════════════════════ */
function traceDayKey(name){
  // Default patrol day rolls over at 00:00. NPV is a NIGHT patrol, so its
  // day rolls over at 09:00 — a fix at 08:59 still belongs to the previous
  // night's shift; 09:00 starts a fresh trail.
  var d=new Date();
  if(/^NPV/i.test(name||"")&&d.getHours()<9){
    d=new Date(d.getTime()-24*3600*1000); // before 9am → count as yesterday
  }
  return ""+d.getFullYear()+("0"+(d.getMonth()+1)).slice(-2)+("0"+d.getDate()).slice(-2);
}
function parsePatchRanges(name){
  var out=[],rgx=/(\d{1,4}(?:\.\d+)?)\s*-\s*(\d{1,4}(?:\.\d+)?)/g,m;
  while((m=rgx.exec(name||""))!==null){
    var a=parseFloat(m[1]),b=parseFloat(m[2]);
    out.push({min:Math.min(a,b),max:Math.max(a,b)});
  }
  return out;
}
function _allPipes(){
  // BRS ROU: four continuous sections, each with its own precise CH → distance mapping
  return[
    {coords:PIPE_PTS,cum:PIPE_CUM,total:PIPE_TOTAL,chLo:CH_LO,chHi:CH_HI,
     chToDist:function(ch){return odToDist(chToOD(ch));}},
    {coords:P2_COORDS,cum:P2_CUM,total:P2_TOTAL,chLo:P2_CH_START,chHi:P2_CH_END,
     chToDist:function(ch){return p2OdToDist(p2ChToOD(ch));}},
    {coords:P3_COORDS,cum:P3_CUM,total:P3_TOTAL,chLo:P3_CH_START,chHi:P3_CH_END,
     chToDist:function(ch){return p3OdToDist(p3ChToOD(ch));}},
    {coords:P4_COORDS,cum:P4_CUM,total:P4_TOTAL,chLo:P4_CH_START,chHi:P4_CH_END,
     chToDist:function(ch){return p4OdToDist(p4ChToOD(ch));}}
  ];
}
function _pipePtAtDist(p,d){
  d=Math.max(0,Math.min(p.total,d));
  var i=0;
  for(var k=0;k<p.cum.length-1;k++){if(p.cum[k]<=d)i=k;else break;}
  var seg=p.cum[i+1]-p.cum[i],t=seg>0?(d-p.cum[i])/seg:0;
  return[p.coords[i][0]+t*(p.coords[i+1][0]-p.coords[i][0]),
         p.coords[i][1]+t*(p.coords[i+1][1]-p.coords[i][1])];
}
function _pipeSliceByDist(p,d0,d1){
  var pts=[_pipePtAtDist(p,d0)];
  for(var i=0;i<p.cum.length;i++){
    if(p.cum[i]>d0&&p.cum[i]<d1)pts.push([p.coords[i][0],p.coords[i][1]]);
  }
  pts.push(_pipePtAtDist(p,d1));
  return pts;
}
// Divide the member's patch (all CH ranges in their name, on every pipeline
// those ranges touch) into 100 m blocks. Block ids are STABLE across sessions:
// pipeline index + the absolute 100 m slot number on that pipeline.
function patchBlocksForName(name){
  var ranges=parsePatchRanges(name);
  if(!ranges.length)return null;
  var pipes=_allPipes(),blocks=[],seen={};
  for(var pi=0;pi<pipes.length;pi++){
    var p=pipes[pi];
    if(!p.coords||!p.coords.length)continue;
    var lo=p.chLo,hi=p.chHi;
    for(var ri=0;ri<ranges.length;ri++){
      var rg=ranges[ri];
      if(rg.max<=lo||rg.min>=hi)continue;
      var cA=Math.max(rg.min,lo),cB=Math.min(rg.max,hi);
      var dA=p.chToDist(cA);
      var dB=p.chToDist(cB);
      var mn=Math.max(0,Math.min(dA,dB)),mx=Math.min(p.total,Math.max(dA,dB));
      if(mx-mn<1)continue;
      var k0=Math.floor(mn/100),k1=Math.floor((mx-0.01)/100);
      for(var k=k0;k<=k1;k++){
        var b0=Math.max(mn,k*100),b1=Math.min(mx,(k+1)*100);
        if(b1-b0<1)continue;
        var id="P"+pi+"_"+k;
        if(seen[id])continue;
        seen[id]=1;
        blocks.push({id:id,pipe:pi,d0:b0,d1:b1,pts:_pipeSliceByDist(p,b0,b1)});
      }
    }
  }
  return blocks.length?blocks:null;
}
// Returns the id of the patch block this position falls in, if the person
// is inside the 25 m geofence corridor — else null.
function coveredBlockAt(blocks,lat,lng){
  if(!blocks)return null;
  var bestId=null,best=Infinity;
  for(var b=0;b<blocks.length;b++){
    var pts=blocks[b].pts;
    for(var i=0;i<pts.length-1;i++){
      var r=ptSegDist(lat,lng,pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
      if(r.d<best){best=r.d;bestId=blocks[b].id;}
    }
  }
  return best<=25?bestId:null;
}


/* ══════════════════════════════════════════════════════
   SMART OD → LINE ROUTING
   Control Room types a PLAIN OD (e.g. "3000") — the section is picked
   automatically from the recipient's patch (parsed from their name):
   • to LW 41-57            → OD read on the SV01–SV02 line
   • to LW 104-119          → OD read on the SV03–SV04 / SV04–151 lines
   If the OD is valid in MORE than one of the recipient's sections
   (e.g. LW 57-73: OD 5000 exists in both SV01–SV02 and SV02–SV03)
   a chooser pops up and Control Room picks the section first.
   Typing a suffixed OD (3000a/b/c) still works exactly as before.
══════════════════════════════════════════════════════ */
const OD_PIPE_DEFS=[
  {suffix:"", chLo:CH_LO,       chHi:CH_HI,     odMin:CH_MIN,   odMax:CH_MAX,   line:"CH 36–59 (SV01–SV02)"},
  {suffix:"a",chLo:P2_CH_START, chHi:P2_CH_END, odMin:P2_OD_MIN,odMax:P2_OD_MAX,line:"CH 59–93.5 (SV02–SV03)"},
  {suffix:"b",chLo:P3_CH_START, chHi:P3_CH_END, odMin:P3_OD_MIN,odMax:P3_OD_MAX,line:"CH 93.5–118.4 (SV03–SV04)"},
  {suffix:"c",chLo:P4_CH_START, chHi:P4_CH_END, odMin:P4_OD_MIN,odMax:P4_OD_MAX,line:"CH 118.4–151 (SV04–151 KMP)"},
];
function resolveOdRouting(od,recipientName){
  const inRange=p=>od>=p.odMin&&od<=p.odMax;
  let pool=[];
  const pr=recipientName?parsePatchRanges(recipientName):null;
  if(pr&&pr.length){
    // strict overlap (a shared single boundary CH like 59.19 does NOT count,
    // so a patch ending exactly at a junction maps to one line, not two)
    pool=OD_PIPE_DEFS.filter(p=>inRange(p)&&pr.some(r=>Math.min(r.min,r.max)<p.chHi&&Math.max(r.min,r.max)>p.chLo));
  }
  if(!pool.length)pool=OD_PIPE_DEFS.filter(inRange);
  return pool;
}
